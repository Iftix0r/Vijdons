<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F2F2F7">
<title>Muvaffaqiyatli</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  *{font-family:-apple-system,'SF Pro Display',sans-serif;-webkit-tap-highlight-color:transparent;}
  body{background:#F2F2F7;color:#000;overscroll-behavior:none;}
  @keyframes bounceIn{0%{transform:scale(.3);opacity:0}60%{transform:scale(1.1)}80%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
  @keyframes fadeUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
  .bi{animation:bounceIn .55s cubic-bezier(.34,1.56,.64,1) both;}
  .fu{animation:fadeUp .4s ease both;}
</style>
</head>
<body style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:env(safe-area-inset-top,47px) 24px env(safe-area-inset-bottom,34px);text-align:center;gap:24px">

<div style="width:96px;height:96px;border-radius:28px;background:rgba(52,199,89,.15);border:1px solid rgba(52,199,89,.3);display:flex;align-items:center;justify-content:center" class="bi">
  <i class="fas fa-check" style="color:#34C759;font-size:40px"></i>
</div>

<div class="fu" style="animation-delay:.15s">
  <div style="font-size:28px;font-weight:700">Muvaffaqiyatli!</div>
  <div style="font-size:15px;color:rgba(60,60,67,.5);margin-top:8px;line-height:1.6">
    Ro'yxatdan o'tdingiz.<br>Admin tasdiqlashini kuting.
  </div>
</div>

<a href="{% url 'driver:login' %}"
   class="fu" style="animation-delay:.25s;background:#FFD600;color:#000;font-size:17px;font-weight:600;letter-spacing:-.41px;border-radius:14px;padding:16px 40px;transition:opacity .15s"
   ontouchstart="this.style.opacity='.7'" ontouchend="this.style.opacity='1'">
  Kirish sahifasiga →
</a>
</body>
</html>
