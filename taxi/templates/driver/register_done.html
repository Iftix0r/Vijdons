<!DOCTYPE html>
<html lang="uz" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1C1C1E">
<title>Muvaffaqiyatli — Vijdon Driver</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  * { font-family:-apple-system,'SF Pro Text',sans-serif; -webkit-tap-highlight-color:transparent; }
  @keyframes bounceIn { 0%{transform:scale(.4);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
  @keyframes fadeUp   { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
  .bounce-in { animation:bounceIn .5s cubic-bezier(.34,1.4,.64,1) both; }
  .fade-up   { animation:fadeUp .4s ease both; }
</style>
</head>
<body class="bg-[#1C1C1E] min-h-screen flex flex-col items-center justify-center px-6 text-center"
      style="padding-top:env(safe-area-inset-top,44px);padding-bottom:env(safe-area-inset-bottom,16px)">

<div class="w-24 h-24 rounded-[28px] bg-green-500/20 border border-green-500/30 flex items-center justify-center mx-auto mb-6 bounce-in">
  <i class="fas fa-check text-green-400 text-4xl"></i>
</div>

<div class="fade-up" style="animation-delay:.15s">
  <h1 class="text-2xl font-black text-white mb-3">Muvaffaqiyatli!</h1>
  <p class="text-gray-400 text-sm leading-relaxed max-w-xs mx-auto">
    Ro'yxatdan o'tdingiz.<br>Admin tasdiqlashini kuting — bu odatda 24 soat ichida bo'ladi.
  </p>
</div>

<a href="{% url 'driver:login' %}"
   class="mt-8 bg-[#FFD600] text-[#1C1C1E] font-black px-8 py-4 rounded-2xl text-sm active:scale-95 transition-transform shadow-lg shadow-yellow-500/25 fade-up"
   style="animation-delay:.25s">
  Kirish sahifasiga →
</a>
</body>
</html>
