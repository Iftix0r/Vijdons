<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ro'yxatdan o'tish — Vijdon Driver</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>* { font-family: -apple-system, 'SF Pro Text', sans-serif; -webkit-tap-highlight-color: transparent; }</style>
</head>
<body class="bg-[#1C1C1E] min-h-screen flex flex-col items-center justify-center px-6 py-10">

<div class="w-16 h-16 rounded-[20px] bg-[#FFD600] flex items-center justify-center mb-8 shadow-xl shadow-yellow-500/30">
  <span class="text-3xl font-black text-[#1C1C1E]">V</span>
</div>

<div class="w-full max-w-sm bg-[#2C2C2E] rounded-3xl p-6 space-y-4">
  <h1 class="text-xl font-black text-white text-center">Ro'yxatdan o'tish</h1>

  {% if error %}
  <div class="bg-red-500/10 border border-red-500/30 rounded-2xl px-4 py-3 text-red-400 text-sm font-semibold">
    {{ error }}
  </div>
  {% endif %}

  <form method="POST" class="space-y-3">
    {% csrf_token %}
    <input type="text" name="full_name" required placeholder="To'liq ism familya"
           class="w-full bg-[#3A3A3C] text-white placeholder-gray-600 rounded-2xl px-4 py-3.5 text-sm font-semibold outline-none focus:ring-2 focus:ring-[#FFD600] transition">
    <input type="tel" name="phone_number" required placeholder="+998 90 000 00 00"
           class="w-full bg-[#3A3A3C] text-white placeholder-gray-600 rounded-2xl px-4 py-3.5 text-sm font-semibold outline-none focus:ring-2 focus:ring-[#FFD600] transition">
    <input type="text" name="car_model" required placeholder="Mashina modeli (Cobalt 2)"
           class="w-full bg-[#3A3A3C] text-white placeholder-gray-600 rounded-2xl px-4 py-3.5 text-sm font-semibold outline-none focus:ring-2 focus:ring-[#FFD600] transition">
    <input type="text" name="car_number" required placeholder="Mashina raqami (01 A 123 AA)"
           class="w-full bg-[#3A3A3C] text-white placeholder-gray-600 rounded-2xl px-4 py-3.5 text-sm font-semibold outline-none focus:ring-2 focus:ring-[#FFD600] transition">
    <input type="password" name="password" required placeholder="Parol (kamida 6 ta belgi)"
           class="w-full bg-[#3A3A3C] text-white placeholder-gray-600 rounded-2xl px-4 py-3.5 text-sm font-semibold outline-none focus:ring-2 focus:ring-[#FFD600] transition">
    <button type="submit"
            class="w-full bg-[#FFD600] text-[#1C1C1E] font-black text-base rounded-2xl py-4 active:scale-95 transition-transform mt-2">
      Ro'yxatdan o'tish
    </button>
  </form>
</div>

<a href="{% url 'driver:login' %}" class="mt-6 text-gray-500 text-sm font-semibold">
  ← Kirish sahifasiga qaytish
</a>
</body>
</html>
