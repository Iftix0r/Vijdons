<!DOCTYPE html>
<html lang="uz" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1C1C1E">
<title>Ro'yxatdan o'tish — Vijdon Driver</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  * { font-family:-apple-system,'SF Pro Text','Segoe UI',sans-serif; -webkit-tap-highlight-color:transparent; }
  body { overscroll-behavior:none; }
  @keyframes fadeUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  .fade-up { animation:fadeUp .35s cubic-bezier(.34,1.4,.64,1) both; }
  input:focus { outline:none; }
</style>
</head>
<body class="bg-[#1C1C1E] min-h-screen flex flex-col" style="padding-top:env(safe-area-inset-top,44px); padding-bottom:env(safe-area-inset-bottom,16px)">

<div class="flex-1 flex flex-col items-center justify-center px-5 py-8">

  <!-- Header -->
  <div class="flex flex-col items-center gap-3 mb-6 fade-up">
    <div class="w-16 h-16 rounded-[20px] bg-[#FFD600] flex items-center justify-center shadow-xl shadow-yellow-500/30">
      <span class="text-3xl font-black text-[#1C1C1E]">V</span>
    </div>
    <h1 class="text-xl font-black text-white">Ro'yxatdan o'tish</h1>
  </div>

  <div class="w-full max-w-sm fade-up" style="animation-delay:.08s">
    <div class="bg-[#2C2C2E] rounded-3xl p-5 space-y-3">

      {% if error %}
      <div class="bg-red-500/15 border border-red-500/30 rounded-2xl px-4 py-3 flex items-center gap-2.5">
        <i class="fas fa-circle-exclamation text-red-400 flex-shrink-0"></i>
        <span class="text-red-400 text-sm font-semibold">{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST" class="space-y-3" id="reg-form">
        {% csrf_token %}

          {% with inp_cls="w-full bg-[#3A3A3C] text-white placeholder-gray-600 rounded-2xl pl-10 pr-4 py-3.5 text-sm font-semibold focus:ring-2 focus:ring-[#FFD600] transition" %}
        <div>
          <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">To'liq ism familya</label>
          <div class="relative"><i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
          <input type="text" name="full_name" required placeholder="Abdullayev Abdulla" class="{{ inp_cls }}"></div>
        </div>
        <div>
          <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">Telefon raqami</label>
          <div class="relative"><i class="fas fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
          <input type="tel" name="phone_number" required placeholder="+998 90 000 00 00" class="{{ inp_cls }}"></div>
        </div>
        <div>
          <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">Mashina modeli</label>
          <div class="relative"><i class="fas fa-car absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
          <input type="text" name="car_model" required placeholder="Cobalt 2, Nexia 3..." class="{{ inp_cls }}"></div>
        </div>
        <div>
          <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">Mashina raqami</label>
          <div class="relative"><i class="fas fa-hashtag absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
          <input type="text" name="car_number" required placeholder="01 A 123 AA" class="{{ inp_cls }}"></div>
        </div>
        <div>
          <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1.5">Parol</label>
          <div class="relative"><i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
          <input type="password" name="password" required placeholder="Kamida 6 ta belgi" class="{{ inp_cls }}"></div>
        </div>
        {% endwith %}

        <button type="submit" id="reg-btn"
                class="w-full bg-[#FFD600] text-[#1C1C1E] font-black text-base rounded-2xl py-4 mt-1 active:scale-95 transition-transform shadow-lg shadow-yellow-500/25 flex items-center justify-center gap-2">
          <span id="reg-btn-text">Ro'yxatdan o'tish</span>
          <i class="fas fa-arrow-right text-sm" id="reg-btn-icon"></i>
        </button>
      </form>
    </div>

    <a href="{% url 'driver:login' %}"
       class="flex items-center justify-center gap-1.5 mt-5 text-gray-500 text-sm font-semibold active:text-gray-300">
      <i class="fas fa-arrow-left text-xs"></i> Kirish sahifasiga qaytish
    </a>
  </div>
</div>

<script>
document.getElementById('reg-form').addEventListener('submit', () => {
  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.style.opacity = '0.7';
  document.getElementById('reg-btn-text').textContent = 'Yuborilmoqda...';
  document.getElementById('reg-btn-icon').className = 'fas fa-spinner fa-spin text-sm';
});
</script>
</body>
</html>
