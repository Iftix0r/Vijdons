<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vijdon Driver — Kirish</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: -apple-system, 'SF Pro Text', sans-serif; -webkit-tap-highlight-color: transparent; }
  body { overscroll-behavior: none; }
</style>
</head>
<body class="bg-[#1C1C1E] min-h-screen flex flex-col items-center justify-center px-6">

<!-- Logo -->
<div class="mb-10 flex flex-col items-center gap-4">
  <div class="w-24 h-24 rounded-[28px] bg-[#FFD600] flex items-center justify-center shadow-2xl shadow-yellow-500/30">
    <span class="text-5xl font-black text-[#1C1C1E]">V</span>
  </div>
  <div class="text-center">
    <h1 class="text-2xl font-black text-white tracking-tight">Vijdon Driver</h1>
    <p class="text-gray-500 text-sm mt-1">Haydovchi ilovasi</p>
  </div>
</div>

<!-- Form card -->
<div class="w-full max-w-sm bg-[#2C2C2E] rounded-3xl p-6 space-y-4">
  {% if error %}
  <div class="bg-red-500/10 border border-red-500/30 rounded-2xl px-4 py-3 text-red-400 text-sm font-semibold">
    <i class="fas fa-circle-exclamation mr-2"></i>{{ error }}
  </div>
  {% endif %}

  <form method="POST" action="{% url 'driver:login' %}" class="space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Telefon raqami</label>
      <input type="tel" name="phone_number" required autofocus
             placeholder="+998 90 000 00 00"
             class="w-full bg-[#3A3A3C] text-white placeholder-gray-600 rounded-2xl px-4 py-3.5 text-sm font-semibold outline-none focus:ring-2 focus:ring-[#FFD600] transition">
    </div>
    <div>
      <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Parol</label>
      <input type="password" name="password" required
             placeholder="••••••••"
             class="w-full bg-[#3A3A3C] text-white placeholder-gray-600 rounded-2xl px-4 py-3.5 text-sm font-semibold outline-none focus:ring-2 focus:ring-[#FFD600] transition">
    </div>
    <button type="submit"
            class="w-full bg-[#FFD600] text-[#1C1C1E] font-black text-base rounded-2xl py-4 mt-2 active:scale-95 transition-transform shadow-lg shadow-yellow-500/20">
      Kirish
    </button>
  </form>
</div>

<a href="{% url 'driver:register' %}" class="mt-6 text-gray-500 text-sm font-semibold">
  Ro'yxatdan o'tish <span class="text-[#FFD600]">→</span>
</a>
</body>
</html>
