<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F2F2F7">
<title>Tasdiq kutilmoqda</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  *{font-family:-apple-system,'SF Pro Display',sans-serif;-webkit-tap-highlight-color:transparent;}
  body{background:#F2F2F7;color:#000;overscroll-behavior:none;}
  @keyframes fadeUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes spin-slow{to{transform:rotate(360deg)}}
  .fu{animation:fadeUp .4s cubic-bezier(.25,.46,.45,.94) both;}
  .spin-slow{animation:spin-slow 3s linear infinite;}
</style>
</head>
<body style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:env(safe-area-inset-top,47px) 24px env(safe-area-inset-bottom,34px);text-align:center">

<div class="fu space-y-5">
  <div style="width:80px;height:80px;border-radius:24px;background:rgba(255,149,0,.12);border:1px solid rgba(255,149,0,.25);display:flex;align-items:center;justify-content:center;margin:0 auto">
    <i class="fas fa-clock spin-slow" style="color:#FF9500;font-size:32px"></i>
  </div>
  <div>
    <div style="font-size:28px;font-weight:700">Tasdiq kutilmoqda</div>
    <div style="font-size:15px;color:rgba(60,60,67,.5);margin-top:8px;line-height:1.5">
      Hisobingiz admin tomonidan<br>ko'rib chiqilmoqda
    </div>
  </div>
  <div style="background:rgba(120,120,128,.14);border-radius:12px;padding:12px 20px;display:inline-flex;align-items:center;gap:10px">
    <i class="fas fa-user" style="color:rgba(60,60,67,.4)"></i>
    <span style="font-size:15px;color:rgba(60,60,67,.8);font-weight:500">{{ driver.full_name }}</span>
  </div>
</div>

<a href="{% url 'driver:logout' %}"
   class="fu" style="animation-delay:.2s;margin-top:48px;font-size:17px;font-weight:500;color:#FF3B30">
  Tizimdan chiqish
</a>
</body>
</html>
