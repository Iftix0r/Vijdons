<!DOCTYPE html>
<html lang="uz" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>{% block title %}Vijdon Driver{% endblock %}</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class'}</script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
/* ── iOS System Font ── */
* {
  font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
  -webkit-tap-highlight-color: transparent;
  box-sizing: border-box;
}
body { overscroll-behavior: none; -webkit-overflow-scrolling: touch; }
::-webkit-scrollbar { display: none; }

/* ── Safe Areas ── */
.safe-top    { height: env(safe-area-inset-top, 47px); }
.safe-bottom { height: env(safe-area-inset-bottom, 34px); }
.pb-safe     { padding-bottom: calc(env(safe-area-inset-bottom, 34px) + 83px); }

/* ── iOS Colors ── */
:root {
  --ios-bg:        #F2F2F7;
  --ios-card:      #FFFFFF;
  --ios-card2:     #F2F2F7;
  --ios-label:     #000000;
  --ios-label2:    #3C3C43;
  --ios-label3:    rgba(60,60,67,.6);
  --ios-sep:       rgba(60,60,67,.29);
  --ios-fill:      rgba(120,120,128,.2);
  --ios-yellow:    #FFD600;
  --ios-green:     #34C759;
  --ios-red:       #FF3B30;
  --ios-blue:      #007AFF;
  --ios-purple:    #AF52DE;
  --ios-orange:    #FF9500;
}
.dark {
  --ios-bg:        #000000;
  --ios-card:      #1C1C1E;
  --ios-card2:     #2C2C2E;
  --ios-label:     #FFFFFF;
  --ios-label2:    rgba(235,235,245,.6);
  --ios-label3:    rgba(235,235,245,.3);
  --ios-sep:       rgba(84,84,88,.65);
  --ios-fill:      rgba(118,118,128,.24);
}
body { background: var(--ios-bg); color: var(--ios-label); }

/* ── iOS Card ── */
.ios-card {
  background: var(--ios-card);
  border-radius: 16px;
}
.ios-card2 {
  background: var(--ios-card2);
  border-radius: 16px;
}

/* ── iOS Tab Bar ── */
.ios-tabbar {
  background: rgba(255,255,255,.88);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-top: .5px solid var(--ios-sep);
  box-shadow: 0 -8px 32px rgba(0,0,0,.10), 0 -1px 0 rgba(0,0,0,.06);
}
.dark .ios-tabbar {
  background: rgba(18,18,20,.92);
  box-shadow: 0 -8px 32px rgba(0,0,0,.40), 0 -1px 0 rgba(255,255,255,.06);
}

/* ── iOS Navigation Bar ── */
.ios-navbar {
  background: rgba(242,242,247,.85);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: .5px solid var(--ios-sep);
}
.dark .ios-navbar {
  background: rgba(0,0,0,.85);
}

/* ── iOS Large Title ── */
.ios-large-title {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: .37px;
  line-height: 1.1;
}
.ios-title { font-size: 17px; font-weight: 600; letter-spacing: -.41px; }
.ios-body  { font-size: 17px; font-weight: 400; letter-spacing: -.41px; }
.ios-callout { font-size: 16px; font-weight: 400; letter-spacing: -.32px; }
.ios-subhead { font-size: 15px; font-weight: 400; letter-spacing: -.24px; }
.ios-footnote { font-size: 13px; font-weight: 400; letter-spacing: -.08px; }
.ios-caption { font-size: 12px; font-weight: 400; letter-spacing: 0; }
.ios-caption2 { font-size: 11px; font-weight: 400; letter-spacing: .07px; }

/* ── Touch Targets: minimal 56px ── */
.ios-btn-primary {
  background: var(--ios-yellow);
  color: #000;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -.41px;
  border-radius: 14px;
  padding: 18px 16px;
  min-height: 56px;
  width: 100%;
  transition: opacity .15s, transform .1s;
}
.ios-btn-primary:active { opacity: .7; transform: scale(.98); }

.ios-btn-destructive {
  background: rgba(255,59,48,.12);
  color: var(--ios-red);
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -.41px;
  border-radius: 14px;
  padding: 18px 16px;
  min-height: 56px;
  width: 100%;
  transition: opacity .15s, transform .1s;
}
.ios-btn-destructive:active { opacity: .7; transform: scale(.98); }

/* ── iOS Input ── */
.ios-input {
  background: var(--ios-fill);
  border-radius: 10px;
  padding: 11px 16px;
  font-size: 17px;
  font-weight: 400;
  letter-spacing: -.41px;
  color: var(--ios-label);
  width: 100%;
  border: none;
  outline: none;
  transition: background .2s;
}
.ios-input::placeholder { color: var(--ios-label3); }
.ios-input:focus { background: rgba(120,120,128,.28); }

/* ── iOS Grouped List ── */
.ios-group {
  background: var(--ios-card);
  border-radius: 12px;
  overflow: hidden;
}
.ios-row {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  border-bottom: .5px solid var(--ios-sep);
  transition: background .1s;
}
.ios-row:last-child { border-bottom: none; }
.ios-row:active { background: var(--ios-fill); }

/* ── iOS Toggle ── */
.ios-toggle {
  width: 51px; height: 31px;
  background: #e5e5ea;
  border-radius: 100px;
  position: relative;
  transition: background .3s;
  flex-shrink: 0;
}
.ios-toggle.on { background: var(--ios-green); }
.ios-toggle::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 27px; height: 27px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 2px 6px rgba(0,0,0,.3);
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
}
.ios-toggle.on::after { transform: translateX(20px); }

/* ── iOS Badge ── */
.ios-badge {
  background: var(--ios-red);
  color: white;
  font-size: 12px;
  font-weight: 700;
  min-width: 18px;
  height: 18px;
  border-radius: 9px;
  padding: 0 5px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Animations ── */
@keyframes ios-slide-up   { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes ios-fade       { from{opacity:0} to{opacity:1} }
@keyframes ios-scale-in   { from{transform:scale(.92);opacity:0} to{transform:scale(1);opacity:1} }
@keyframes ios-sheet-up   { from{transform:translateY(100%)} to{transform:translateY(0)} }
@keyframes shimmer        { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
@keyframes pulse-ring     { 0%{transform:scale(1);opacity:.6} 100%{transform:scale(2.4);opacity:0} }
@keyframes spin-slow      { to{transform:rotate(360deg)} }

.anim-up     { animation: ios-slide-up .36s cubic-bezier(.25,.46,.45,.94) both; }
.anim-fade   { animation: ios-fade .25s ease both; }
.anim-scale  { animation: ios-scale-in .3s cubic-bezier(.34,1.56,.64,1) both; }

.skeleton {
  background: linear-gradient(90deg, var(--ios-fill) 25%, rgba(120,120,128,.12) 50%, var(--ios-fill) 75%);
  background-size: 400px 100%;
  animation: shimmer 1.6s infinite;
  border-radius: 12px;
}

/* ── iOS Sheet — shaffof "material" fon (Apple bottom sheet uslubi) ── */
.ios-sheet {
  border-radius: 20px 20px 0 0;
  background: rgba(255,255,255,.75);
  backdrop-filter: saturate(180%) blur(28px);
  -webkit-backdrop-filter: saturate(180%) blur(28px);
  box-shadow: 0 -8px 40px rgba(0,0,0,.14);
}
.dark .ios-sheet {
  background: rgba(28,28,30,.78);
  box-shadow: 0 -8px 40px rgba(0,0,0,.5);
}
.ios-sheet-handle {
  width: 36px; height: 5px;
  background: var(--ios-sep);
  border-radius: 3px;
  margin: 8px auto 0;
}

/* ── iOS Alert card — suzuvchi ogohlantirish/modal uchun material fon ── */
.ios-alert {
  background: rgba(255,255,255,.78);
  backdrop-filter: saturate(180%) blur(28px);
  -webkit-backdrop-filter: saturate(180%) blur(28px);
  box-shadow: 0 20px 60px rgba(0,0,0,.25);
}
.dark .ios-alert {
  background: rgba(28,28,30,.8);
  box-shadow: 0 20px 60px rgba(0,0,0,.6);
}

/* ── Status pills ── */
.pill-yellow  { background:rgba(255,214,0,.15);  color:#B8860B; }
.pill-blue    { background:rgba(0,122,255,.12);   color:var(--ios-blue); }
.pill-purple  { background:rgba(175,82,222,.12);  color:var(--ios-purple); }
.pill-green   { background:rgba(52,199,89,.12);   color:#1a7a35; }
.dark .pill-yellow { color:#FFD600; }
.dark .pill-green  { color:var(--ios-green); }

</style>
</head>
<body>

<!-- Status bar spacer -->
<div class="safe-top" style="background:var(--ios-bg)"></div>

<!-- Offline banner -->
<div id="offline-bar" class="hidden fixed left-0 right-0 z-[500] text-center ios-caption2 font-semibold py-1.5 bg-[#FF3B30] text-white"
     style="top:env(safe-area-inset-top,47px)">
  Internet aloqasi yo'q
</div>

<!-- iOS Toast / Alert Banner -->
<div id="toast" class="fixed left-4 right-4 z-[400] hidden"
     style="top:calc(env(safe-area-inset-top,47px) + 8px)">
  <div id="toast-inner"
       class="ios-alert flex items-center gap-3 px-4 py-3.5"
       style="border-radius:14px">
    <div id="toast-icon-wrap"
         class="w-9 h-9 rounded-[10px] flex items-center justify-center flex-shrink-0">
      <i id="toast-icon" class="text-lg"></i>
    </div>
    <div class="flex-1 min-w-0">
      <div id="toast-title" class="ios-footnote font-semibold leading-tight"></div>
      <div id="toast-body"  class="ios-caption2 mt-0.5 leading-tight" style="color:var(--ios-label3)"></div>
    </div>
    <button onclick="hideToast()" style="color:var(--ios-label3);font-size:20px;line-height:1">×</button>
  </div>
</div>

<!-- Page content -->
<main class="pb-safe overflow-y-auto" id="main-content" style="min-height:100vh;overscroll-behavior:none">
  {% block content %}{% endblock %}
</main>

<!-- iOS Tab Bar -->
<div class="ios-tabbar fixed bottom-0 left-0 right-0 z-50">
  <div class="flex items-center justify-around px-2 pt-2"
       style="padding-bottom:env(safe-area-inset-bottom,34px)">

    <a href="{% url 'driver:home' %}" onclick="Native.vibrate(); dismissAllSheets()"
       class="flex flex-col items-center gap-[3px] px-4 py-2 min-h-[56px] justify-center transition-all active:opacity-60">
      <i class="fas fa-car-side text-[24px] {% if active_tab == 'home' %}text-[#FFD600]{% else %}text-[#8E8E93]{% endif %}"></i>
      <span class="ios-caption2 {% if active_tab == 'home' %}text-[#FFD600] font-semibold{% else %}text-[#8E8E93]{% endif %}">Asosiy</span>
    </a>

    <a href="{% url 'driver:history' %}" onclick="Native.vibrate(); dismissAllSheets()"
       class="flex flex-col items-center gap-[3px] px-4 py-2 min-h-[56px] justify-center transition-all active:opacity-60">
      <i class="fas fa-clock-rotate-left text-[24px] {% if active_tab == 'history' %}text-[#FFD600]{% else %}text-[#8E8E93]{% endif %}"></i>
      <span class="ios-caption2 {% if active_tab == 'history' %}text-[#FFD600] font-semibold{% else %}text-[#8E8E93]{% endif %}">Tarix</span>
    </a>

    <a href="{% url 'driver:chat' %}" onclick="Native.vibrate()"
       class="flex flex-col items-center gap-[3px] px-4 py-2 min-h-[56px] justify-center transition-all active:opacity-60 relative">
      <i class="fas fa-comments text-[24px] {% if active_tab == 'chat' %}text-[#FFD600]{% else %}text-[#8E8E93]{% endif %}"></i>
      {% if chat_unread > 0 %}
      <span class="ios-badge absolute top-1 right-2" style="font-size:10px;min-width:16px;height:16px">{{ chat_unread }}</span>
      {% endif %}
      <span class="ios-caption2 {% if active_tab == 'chat' %}text-[#FFD600] font-semibold{% else %}text-[#8E8E93]{% endif %}">Chat</span>
    </a>

  </div>
</div>


<script>
// Sahifalar orasida navigatsiyada sheet overlay qolib ketmasligi uchun
function dismissAllSheets() {
  document.querySelectorAll('#sheet-overlay').forEach(ov => {
    ov.classList.add('hidden');
    ov.style.pointerEvents = 'none';
  });
  document.querySelectorAll('#sheet').forEach(sh => {
    sh.style.transform = 'translateY(100%)';
  });
}
window.addEventListener('pagehide', dismissAllSheets);
window.addEventListener('pageshow', e => {
  if (e.persisted) dismissAllSheets();
});

// ── Native Bridge ─────────────────────────────────────────────────────────────
const Native = {
  isApp: typeof NativeBridge !== 'undefined',
  vibrate(p=10) {
    if (this.isApp) NativeBridge.postMessage(JSON.stringify({action:'vibrate'}));
    else if (navigator.vibrate) navigator.vibrate(p);
  },
  getLocation() {
    return new Promise((res,rej) => {
      if (this.isApp) {
        NativeBridge.postMessage(JSON.stringify({action:'get_location'}));
        window.addEventListener('vijdon_location', e=>res(e.detail), {once:true});
        setTimeout(()=>rej('timeout'), 10000);
      } else if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          p=>res({lat:p.coords.latitude,lng:p.coords.longitude}),
          rej, {enableHighAccuracy:true,timeout:8000}
        );
      } else rej('no_gps');
    });
  },
  callPhone(phone) { window.location.href='tel:'+phone; }
};

// ── Toast ─────────────────────────────────────────────────────────────────────
let _tt;
const _TS = {
  order:   {bg:'#FFD600',  ic:'#000',    icon:'fa-bell',         label:'Yangi buyurtma'},
  success: {bg:'#34C759',  ic:'#fff',    icon:'fa-checkmark',    label:''},
  error:   {bg:'#FF3B30',  ic:'#fff',    icon:'fa-xmark-circle', label:''},
  info:    {bg:'#007AFF',  ic:'#fff',    icon:'fa-info',         label:''},
};
function showToast(title, body='', type='info', dur=3200) {
  const s = _TS[type]||_TS.info;
  const wrap = document.getElementById('toast-icon-wrap');
  wrap.style.background = s.bg+'22';
  document.getElementById('toast-icon').className = `fas ${s.icon} text-lg`;
  document.getElementById('toast-icon').style.color = s.bg;
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-body').textContent  = body;
  const el = document.getElementById('toast');
  el.classList.remove('hidden');
  el.style.opacity='1'; el.style.transform='translateY(0)';
  clearTimeout(_tt);
  _tt = setTimeout(hideToast, type==='order'?8000:dur);
}
function hideToast() {
  const el = document.getElementById('toast');
  el.style.transition='opacity .25s,transform .25s';
  el.style.opacity='0'; el.style.transform='translateY(-8px)';
  setTimeout(()=>{ el.classList.add('hidden'); el.style.transition=''; el.style.opacity=''; el.style.transform=''; }, 260);
}

// ── Offline ───────────────────────────────────────────────────────────────────
// ── Audio Alerts ─────────────────────────────────────────────────────────────
const Audio = {
  _play(notes) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      notes.forEach(([t, type, f, v=0.3, d=0.15]) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = type || 'sine';
        o.frequency.value = f;
        const st = ctx.currentTime + t;
        g.gain.setValueAtTime(0, st);
        g.gain.linearRampToValueAtTime(v, st + 0.015);
        g.gain.exponentialRampToValueAtTime(0.001, st + d);
        o.start(st); o.stop(st + d + 0.05);
      });
    } catch(_) {}
  },
  newOrder() {
    // WAV fayl
    try {
      if (window._newOrderAudio) { window._newOrderAudio.pause(); window._newOrderAudio = null; }
      const a = new window.Audio('/static/driver/sounds/new_order.wav');
      a.volume = 1.0;
      a.loop = true;
      const p = a.play();
      if (p && p.catch) p.catch(() => {
        // Autoplay blocked — Web Audio API bilan chalishga urinamiz
        this._playWebAudio();
      });
      window._newOrderAudio = a;
    } catch(_) { this._playWebAudio(); }
  },
  _playWebAudio() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      window._newOrderCtx = ctx;
      const pattern = [
        [0, 1400, 0.5, 0.08], [0.13, 1800, 0.5, 0.08], [0.26, 2200, 0.6, 0.12],
        [0.5, 1400, 0.5, 0.08], [0.63, 1800, 0.5, 0.08], [0.76, 2200, 0.6, 0.12],
        [1.0, 1400, 0.5, 0.08], [1.13, 1800, 0.5, 0.08], [1.26, 2200, 0.6, 0.12],
      ];
      for (let r = 0; r < 4; r++) {
        pattern.forEach(([t, f, v, d]) => {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = 'square'; o.frequency.value = f;
          const st = ctx.currentTime + t + r * 1.6;
          g.gain.setValueAtTime(0, st);
          g.gain.linearRampToValueAtTime(v, st + 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, st + d);
          o.start(st); o.stop(st + d + 0.05);
        });
      }
    } catch(_) {}
  },
  stopNewOrder() {
    if (window._newOrderAudio) {
      window._newOrderAudio.pause();
      window._newOrderAudio.currentTime = 0;
      window._newOrderAudio = null;
    }
    if (window._newOrderCtx) {
      try { window._newOrderCtx.close(); } catch(_) {}
      window._newOrderCtx = null;
    }
  },
  accept() {
    // Yashil — yuqoriga ko'tariluvchi 3 nota
    this._play([
      [0,    'sine',   523, 0.35, 0.12],
      [0.13, 'sine',   659, 0.35, 0.12],
      [0.26, 'sine',   784, 0.40, 0.22],
      [0.28, 'sine',  1047, 0.25, 0.18],
    ]);
  },
  reject() {
    // Qizil — pastga tushuvchi 2 nota
    this._play([
      [0,    'sawtooth', 440, 0.30, 0.14],
      [0.18, 'sawtooth', 330, 0.30, 0.14],
      [0.36, 'sawtooth', 220, 0.25, 0.22],
    ]);
  },
  complete() {
    // Oltin — tantanali 4 nota
    this._play([
      [0,    'sine',  523, 0.30, 0.10],
      [0.12, 'sine',  659, 0.30, 0.10],
      [0.24, 'sine',  784, 0.30, 0.10],
      [0.36, 'sine', 1047, 0.45, 0.30],
      [0.38, 'sine', 1319, 0.30, 0.28],
    ]);
  },
  offline()  { this._play([[0,'sawtooth',220,0.30,0.40]]); },
  online()   { this._play([[0,'sine',523,0.25,0.10],[0.15,'sine',784,0.25,0.18]]); },
};

// ── Web Push Subscription ────────────────────────────────────────────────────
// Push subscription home.html da (driver.is_on_duty bo'lganda) amalga oshiriladi.
// Service Worker ni faqat ro'yxatdan o'tkazamiz:
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/driver/sw.js', { scope: '/driver/' }).catch(() => {});
}

window.addEventListener('offline', () => {
  document.getElementById('offline-bar').classList.remove('hidden');
  Audio.offline();
});
window.addEventListener('online', () => {
  document.getElementById('offline-bar').classList.add('hidden');
  showToast('Aloqa tiklandi', '', 'success', 2000);
  Audio.online();
});
if (!navigator.onLine) document.getElementById('offline-bar').classList.remove('hidden');

// ── GPS sync ──────────────────────────────────────────────────────────────────
window.addEventListener('vijdon_location', e=>{
  fetch('{% url "driver:location_sync" %}',{
    method:'POST',
    headers:{'Content-Type':'application/json','X-CSRFToken':getCookie('csrftoken')},
    body:JSON.stringify({lat:e.detail.lat,lng:e.detail.lng})
  }).catch(()=>{});
});

// ── Helpers ───────────────────────────────────────────────────────────────────
let _hbgBusy = false;
// Ish navbatini almashtiradi. true/false qaytaradi — chaqiruvchi (masalan
// Asosiy sahifadagi swipe boshqaruvi) muvaffaqiyatsiz bo'lsa UI'ni orqaga
// qaytarishi (masalan tugmani joyiga qaytarish) uchun buni tekshira oladi.
async function hbgToggleDuty() {
  if (_hbgBusy) return false;
  _hbgBusy = true;
  try {
    const r = await fetch('{% url "driver:duty_toggle" %}', { method: 'POST', headers: { 'X-CSRFToken': getCookie('csrftoken') } });
    const d = await r.json();
    if (d.ok) {
      sessionStorage.removeItem('vijdon_addr');
      sessionStorage.removeItem('vijdon_lat');
      sessionStorage.removeItem('vijdon_lng');
      location.reload();
      return true;
    }
    showToast('Xatolik', d.error || "Qayta urinib ko'ring", 'error', 4000);
    return false;
  } catch(_) {
    showToast('Xatolik', "Qayta urinib ko'ring", 'error');
    return false;
  } finally { _hbgBusy = false; }
}
function getCookie(n) {
  const v = document.cookie.match('(^|;) ?'+n+'=([^;]*)(;|$)');
  return v?v[2]:'';
}
document.addEventListener('DOMContentLoaded', ()=>{ Native.getLocation().catch(()=>{}); });

// ── TAXIMETER (barcha sahifalarda umumiy) ──────────────────────────────────────
// Bu yerga (base.html) ko'chirilgan — aks holda Home'dan Tarix/Chat/Profilga
// o'tilganda sahifa to'liq qayta yuklangani uchun (SPA emas) taximetr JS holati
// butunlay o'chib qolar, GPS orqali masofa hisoblash to'xtab qolardi.
const TMX_BASE_PRICE  = {{ tariff_base_price|default:0 }};
const TMX_PER_KM      = {{ tariff_per_km|default:0 }};

let _tmxActive    = false;
let _tmxOrderId   = null;
let _tmxOrder     = null;
let _tmxStartTime = null;
let _tmxInterval  = null;
let _tmxDistKm    = 0;
let _tmxPrevLat   = null;
let _tmxPrevLng   = null;
let _tmxWatchId   = null;
let _tmxPriceStr  = '0';
let _tmxTimeStr   = '0:00';
let _tmxSpeedKmh  = 0;

// Serverga taximetr ma'lumotlarini saqlash
let _tmxSaveTimer = null;

function _tmxSave() {
  if (!_tmxOrderId) return;
  clearTimeout(_tmxSaveTimer);
  _tmxSaveTimer = setTimeout(_tmxFlushNow, 2000);
}

// Ilova fonga o'tganda/yopilganda darhol yuboramiz — 2s debounce tugashini kutmasdan,
// aks holda oxirgi bir necha soniyalik masofa/narx bazaga yozilmay qolib,
// ilova qayta ochilganda taximetr orqaga tortiladi
function _tmxFlushNow() {
  clearTimeout(_tmxSaveTimer);
  if (!_tmxOrderId) return;
  const body = `dist_km=${_tmxDistKm.toFixed(3)}&price=${parseFloat((_tmxPriceStr||'0').replace(/[^\d.]/g,''))||0}&csrfmiddlewaretoken=${encodeURIComponent(getCookie('csrftoken')||'')}`;
  if (navigator.sendBeacon) {
    navigator.sendBeacon(
      `/driver/orders/${_tmxOrderId}/meter/`,
      new Blob([body], { type: 'application/x-www-form-urlencoded' })
    );
  } else {
    fetch(`/driver/orders/${_tmxOrderId}/meter/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-CSRFToken': getCookie('csrftoken') },
      body,
      keepalive: true,
    }).catch(() => {});
  }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && _tmxActive) _tmxFlushNow();
});
window.addEventListener('pagehide', () => { if (_tmxActive) _tmxFlushNow(); });

function _tmxClear() {}

// Haversine masofa (km)
function _haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
            Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function _resetSheetOverlay() {
  const ov = document.getElementById('sheet-overlay');
  const sh = document.getElementById('sheet');
  if (!ov || !sh) return;
  ov.classList.add('hidden');
  ov.style.pointerEvents = 'none';
  sh.style.transform = 'translateY(100%)';
}

function _tmxPersist() {
  if (!_tmxOrderId) return;
  sessionStorage.setItem('vijdon_tmx_' + _tmxOrderId, JSON.stringify({
    price: _tmxPriceStr,
    dist:  _tmxDistKm,
    time:  _tmxTimeStr,
  }));
}

function tmxStart(orderId, order) {
  if (_tmxActive && _tmxOrderId === orderId) return;
  if (_tmxActive) tmxStop();
  _tmxActive  = true;
  _tmxOrderId = orderId;
  _tmxPrevLat = null;
  _tmxPrevLng = null;
  _tmxSpeedKmh = 0;

  _tmxOrder     = order;
  // Haqiqiy boshlanish vaqti — serverdan (ilova qayta ochilganda ham to'g'ri hisoblansin)
  _tmxStartTime = order?.tmx_start_time ? new Date(order.tmx_start_time).getTime() : Date.now();
  _tmxDistKm    = (order?.tmx_dist_km && parseFloat(order.tmx_dist_km) > 0)
                    ? parseFloat(order.tmx_dist_km) : 0;
  _tmxPriceStr  = '0';
  _tmxTimeStr   = '0:00';

  // sessionStorage dan tiklash (shu sessiya ichida sahifa yangilansa) — masofa uchun,
  // narx va vaqt har doim formuladan qayta hisoblanadi (pastda)
  try {
    const raw = sessionStorage.getItem('vijdon_tmx_' + orderId);
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved.dist > 0 && saved.dist > _tmxDistKm) _tmxDistKm = parseFloat(saved.dist);
    }
  } catch(_) {}

  // Narx va vaqt doim joriy masofa/vaqtdan hisoblanadi — bazadagi eski price
  // qiymatini "belgilangan narx" deb noto'g'ri qabul qilib, taximetrni muzlatib qo'ymaslik uchun
  _tmxPriceStr = Math.round(TMX_BASE_PRICE + _tmxDistKm * TMX_PER_KM).toLocaleString('uz-UZ');
  if (_tmxStartTime) {
    const elapsed = Math.max(0, Math.floor((Date.now() - _tmxStartTime) / 1000));
    _tmxTimeStr = Math.floor(elapsed / 60) + ':' + String(elapsed % 60).padStart(2, '0');
  }
  // Ekranda ko'rsatiladigan (silliqlangan) qiymatlar — GPS nuqtalari notekis
  // kelgani uchun masofa "qotib-qotib" (sakrab-sakrab) o'zgarib ko'rinmasligi
  // uchun, haqiqiy qiymatga har kadr biroz yaqinlashtirib boriladi (pastda).
  _tmxDispDist  = _tmxDistKm;
  _tmxDispPrice = parseFloat(_tmxPriceStr.replace(/[^\d.]/g, '')) || 0;

  _tmxPersist();
  _tmxInterval = setInterval(_tmxTick, 1000);
  requestAnimationFrame(_tmxSmoothLoop);
  window.addEventListener('vijdon_location', _tmxOnLocation);
  if (navigator.geolocation) {
    _tmxWatchId = navigator.geolocation.watchPosition(
      pos => _tmxOnLocation({ detail: { lat: pos.coords.latitude, lng: pos.coords.longitude, speed: pos.coords.speed } }),
      () => {},
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 3000 }
    );
  }
}

function _tmxOnLocation(e) {
  const lat = e.detail?.lat;
  const lng = e.detail?.lng;
  const spd = e.detail?.speed;
  if (!lat || !lng || !_tmxActive) return;

  if (spd != null && spd >= 0) _tmxSpeedKmh = Math.round(spd * 3.6);

  if (_tmxPrevLat !== null) {
    const d = _haversine(_tmxPrevLat, _tmxPrevLng, lat, lng);
    if (d > 0.005 && d < 2.0) {
      _tmxDistKm += d;
      _tmxUpdatePrice();
      _syncSheetTmx();
      _tmxSave();
    }
  }
  _tmxPrevLat = lat;
  _tmxPrevLng = lng;
}

function _syncSheetTmx(order) {
  const p = document.getElementById('sheet-tmx-price');
  const t = document.getElementById('sheet-tmx-time');
  const d = document.getElementById('sheet-tmx-dist');
  const s = document.getElementById('sheet-tmx-speed');
  // Faol bo'lsa narx/masofani _tmxSmoothLoop yangilaydi (silliq o'sish uchun) —
  // bu yerda faqat FAOL BO'LMAGAN (masalan yakunlangan) buyurtma uchun statik
  // qiymatlarni ko'rsatamiz.
  if (!_tmxActive) {
    if(p) p.textContent = (order?.price ? parseInt(order.price).toLocaleString('uz-UZ') : _tmxPriceStr) || '0';
    if(d) d.textContent = parseFloat(order?.tmx_dist_km || _tmxDistKm || 0).toFixed(2);
  }
  if(t) t.textContent = _tmxTimeStr  || '0:00';
  if(s) s.textContent = _tmxSpeedKmh;
}

// Ekrandagi narx/masofani har kadrda haqiqiy qiymatga biroz yaqinlashtirib boradi —
// GPS nuqtalari notekis (har necha soniyada bir) kelgani uchun raqam sakrab-sakrab
// emas, doim silliq (uzluksiz) o'sayotgandek ko'rinadi.
let _tmxDispDist  = 0;
let _tmxDispPrice = 0;
function _tmxSmoothLoop() {
  if (!_tmxActive) return;
  const priceTarget = parseFloat((_tmxPriceStr || '0').replace(/[^\d.]/g, '')) || 0;
  _tmxDispDist  += (_tmxDistKm  - _tmxDispDist)  * 0.12;
  _tmxDispPrice += (priceTarget - _tmxDispPrice) * 0.12;
  if (Math.abs(_tmxDistKm  - _tmxDispDist)  < 0.001) _tmxDispDist  = _tmxDistKm;
  if (Math.abs(priceTarget - _tmxDispPrice) < 1)     _tmxDispPrice = priceTarget;
  const p = document.getElementById('sheet-tmx-price');
  const d = document.getElementById('sheet-tmx-dist');
  if (p) p.textContent = Math.round(_tmxDispPrice).toLocaleString('uz-UZ');
  if (d) d.textContent = _tmxDispDist.toFixed(2);
  requestAnimationFrame(_tmxSmoothLoop);
}

function _tmxTick() {
  if (!_tmxActive || !_tmxStartTime) return;
  const elapsed = Math.floor((Date.now() - _tmxStartTime) / 1000);
  const min = Math.floor(elapsed / 60);
  const sec = elapsed % 60;
  _tmxTimeStr = min + ':' + String(sec).padStart(2, '0');
  _tmxUpdatePrice();
  _syncSheetTmx();
  _tmxSave();
  // Taximetr qiymatlarini sessionStorage ga saqlaymiz — history.html ularni o'qiydi
  if (_tmxOrderId) {
    sessionStorage.setItem('vijdon_tmx_' + _tmxOrderId, JSON.stringify({
      price: _tmxPriceStr,
      dist:  _tmxDistKm,
      time:  _tmxTimeStr,
    }));
  }
}

function _tmxUpdatePrice() {
  if (!_tmxActive) return;
  const price = Math.round(TMX_BASE_PRICE + _tmxDistKm * TMX_PER_KM);
  _tmxPriceStr = price.toLocaleString('uz-UZ');
}

function tmxStop() {
  _tmxActive = false;
  clearInterval(_tmxInterval);
  _tmxInterval = null;
  if (_tmxWatchId !== null) {
    navigator.geolocation?.clearWatch(_tmxWatchId);
    _tmxWatchId = null;
  }
  window.removeEventListener('vijdon_location', _tmxOnLocation);
  _tmxClear();
}

// Har qanday sahifada (Home, Tarix, Chat, Profil) faol (on_way/arrived) buyurtma
// bo'lsa, taximetrni shu yerda tiklaymiz. Home sahifasi buni o'zi ham darhol
// (oldindan yuklangan ma'lumot bilan, tarmoqqa so'rov yubormasdan) qiladi —
// tmxStart() ichidagi tekshiruv tufayli bu yerdagi so'rov ular uchun shunchaki
// zararsiz takroriy urinish, boshqa sahifalar uchun esa yagona manba bo'ladi.
(function(){
  fetch('{% url "driver:orders_json" %}', {cache:'no-store'})
    .then(r => r.json())
    .then(d => {
      if (!d.orders) return;
      const active = d.orders.find(o => o.status === 'on_way' || o.status === 'arrived');
      if (active) tmxStart(active.id, active);
    })
    .catch(() => {});
})();

// ── Wake Lock (barcha sahifalarda umumiy) ──────────────────────────────────────
// Avval faqat Home sahifasida bor edi — Tarix/Chat/Profilga o'tilganda ekran
// qulflanib qolib, JS taymerlari (jumladan taximetr) sekinlashib "qotib-qotib"
// ishlab qolardi. Endi bu yerda — qaysi sahifada bo'lishidan qat'i nazar ishlaydi.
const IS_ON_DUTY_GLOBAL = {{ driver.is_on_duty|yesno:'true,false' }};
let _wakeLock = null;

async function requestWakeLock() {
  if (!(IS_ON_DUTY_GLOBAL || _tmxActive)) return;
  if (!('wakeLock' in navigator)) return;
  if (_wakeLock) return;
  try {
    _wakeLock = await navigator.wakeLock.request('screen');
    _wakeLock.addEventListener('release', () => { _wakeLock = null; });
  } catch(_) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
  if (document.visibilityState === 'hidden') Audio.stopNewOrder();
});
if (IS_ON_DUTY_GLOBAL) requestWakeLock();
// Ba'zi qurilmalarda/WebView versiyalarida wake lock kutilmaganda (visibilitychange
// va 'release' hodisasisiz) bo'shab qolishi mumkin — shuning uchun har 15 soniyada
// zararsiz tarzda qayta so'raymiz (agar allaqachon faol bo'lsa, hech narsa qilmaydi)
setInterval(requestWakeLock, 15000);
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
