<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F2F2F7">
<title>{% block title %}Vijdon Driver{% endblock %}</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class'}</script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
/* ── iOS System Font ── */
* {
  font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
  -webkit-tap-highlight-color: transparent;
  box-sizing: border-box;
}
body { overscroll-behavior: none; -webkit-overflow-scrolling: touch; }
::-webkit-scrollbar { display: none; }

/* ── Safe Areas ── */
.safe-top    { height: env(safe-area-inset-top, 47px); }
.safe-bottom { height: env(safe-area-inset-bottom, 34px); }
.pb-safe     { padding-bottom: calc(env(safe-area-inset-bottom, 34px) + 83px); }

/* ── iOS Colors ── */
:root {
  --ios-bg:        #F2F2F7;
  --ios-card:      #FFFFFF;
  --ios-card2:     #F2F2F7;
  --ios-label:     #000000;
  --ios-label2:    #3C3C43;
  --ios-label3:    rgba(60,60,67,.6);
  --ios-sep:       rgba(60,60,67,.29);
  --ios-fill:      rgba(120,120,128,.2);
  --ios-yellow:    #FFD600;
  --ios-green:     #34C759;
  --ios-red:       #FF3B30;
  --ios-blue:      #007AFF;
  --ios-purple:    #AF52DE;
  --ios-orange:    #FF9500;
}
.dark {
  --ios-bg:        #000000;
  --ios-card:      #1C1C1E;
  --ios-card2:     #2C2C2E;
  --ios-label:     #FFFFFF;
  --ios-label2:    rgba(235,235,245,.6);
  --ios-label3:    rgba(235,235,245,.3);
  --ios-sep:       rgba(84,84,88,.65);
  --ios-fill:      rgba(118,118,128,.24);
}
body { background: var(--ios-bg); color: var(--ios-label); }

/* ── iOS Card ── */
.ios-card {
  background: var(--ios-card);
  border-radius: 16px;
}
.ios-card2 {
  background: var(--ios-card2);
  border-radius: 16px;
}

/* ── iOS Tab Bar — Instagram uslubidagi suzib turuvchi panel: chetlarga
   yopishmaydi, to'liq dumaloq (pill) shaklda, atrofida soya bilan ── */
.ios-tabbar {
  background: rgba(255,255,255,.88);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border: .5px solid var(--ios-sep);
  border-radius: 9999px;
  box-shadow: 0 8px 28px rgba(0,0,0,.16), 0 2px 8px rgba(0,0,0,.08);
}
.dark .ios-tabbar {
  background: rgba(18,18,20,.92);
  box-shadow: 0 8px 28px rgba(0,0,0,.50), 0 2px 8px rgba(0,0,0,.30);
}

/* ── iOS Navigation Bar ── */
.ios-navbar {
  background: rgba(242,242,247,.85);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: .5px solid var(--ios-sep);
}
.dark .ios-navbar {
  background: rgba(0,0,0,.85);
}

/* ── iOS Large Title ── */
.ios-large-title {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: .37px;
  line-height: 1.1;
}
.ios-title { font-size: 17px; font-weight: 600; letter-spacing: -.41px; }
.ios-body  { font-size: 17px; font-weight: 400; letter-spacing: -.41px; }
.ios-callout { font-size: 16px; font-weight: 400; letter-spacing: -.32px; }
.ios-subhead { font-size: 15px; font-weight: 400; letter-spacing: -.24px; }
.ios-footnote { font-size: 13px; font-weight: 400; letter-spacing: -.08px; }
.ios-caption { font-size: 12px; font-weight: 400; letter-spacing: 0; }
.ios-caption2 { font-size: 11px; font-weight: 400; letter-spacing: .07px; }

/* ── Touch Targets: minimal 56px ── */
.ios-btn-primary {
  background: var(--ios-yellow);
  color: #000;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -.41px;
  border-radius: 14px;
  padding: 18px 16px;
  min-height: 56px;
  width: 100%;
  transition: opacity .15s, transform .1s;
}
.ios-btn-primary:active { opacity: .7; transform: scale(.98); }

.ios-btn-destructive {
  background: rgba(255,59,48,.12);
  color: var(--ios-red);
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -.41px;
  border-radius: 14px;
  padding: 18px 16px;
  min-height: 56px;
  width: 100%;
  transition: opacity .15s, transform .1s;
}
.ios-btn-destructive:active { opacity: .7; transform: scale(.98); }

/* ── iOS Input ── */
.ios-input {
  background: var(--ios-fill);
  border-radius: 10px;
  padding: 11px 16px;
  font-size: 17px;
  font-weight: 400;
  letter-spacing: -.41px;
  color: var(--ios-label);
  width: 100%;
  border: none;
  outline: none;
  transition: background .2s;
}
.ios-input::placeholder { color: var(--ios-label3); }
.ios-input:focus { background: rgba(120,120,128,.28); }

/* ── iOS Grouped List ── */
.ios-group {
  background: var(--ios-card);
  border-radius: 12px;
  overflow: hidden;
}
.ios-row {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  border-bottom: .5px solid var(--ios-sep);
  transition: background .1s;
}
.ios-row:last-child { border-bottom: none; }
.ios-row:active { background: var(--ios-fill); }

/* ── iOS Toggle ── */
.ios-toggle {
  width: 51px; height: 31px;
  background: #e5e5ea;
  border-radius: 100px;
  position: relative;
  transition: background .3s;
  flex-shrink: 0;
}
.ios-toggle.on { background: var(--ios-green); }
.ios-toggle::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 27px; height: 27px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 2px 6px rgba(0,0,0,.3);
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
}
.ios-toggle.on::after { transform: translateX(20px); }

/* ── iOS Badge ── */
.ios-badge {
  background: var(--ios-red);
  color: white;
  font-size: 12px;
  font-weight: 700;
  min-width: 18px;
  height: 18px;
  border-radius: 9px;
  padding: 0 5px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Animations ── */
@keyframes ios-slide-up   { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes ios-fade       { from{opacity:0} to{opacity:1} }
@keyframes ios-scale-in   { from{transform:scale(.92);opacity:0} to{transform:scale(1);opacity:1} }
@keyframes ios-sheet-up   { from{transform:translateY(100%)} to{transform:translateY(0)} }
@keyframes shimmer        { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
@keyframes pulse-ring     { 0%{transform:scale(1);opacity:.6} 100%{transform:scale(2.4);opacity:0} }
@keyframes spin-slow      { to{transform:rotate(360deg)} }

.anim-up     { animation: ios-slide-up .36s cubic-bezier(.25,.46,.45,.94) both; }
.anim-fade   { animation: ios-fade .25s ease both; }
.anim-scale  { animation: ios-scale-in .3s cubic-bezier(.34,1.56,.64,1) both; }

.skeleton {
  background: linear-gradient(90deg, var(--ios-fill) 25%, rgba(120,120,128,.12) 50%, var(--ios-fill) 75%);
  background-size: 400px 100%;
  animation: shimmer 1.6s infinite;
  border-radius: 12px;
}

/* ── iOS Sheet — shaffof "material" fon (Apple bottom sheet uslubi) ── */
.ios-sheet {
  border-radius: 20px 20px 0 0;
  background: rgba(255,255,255,.75);
  backdrop-filter: saturate(180%) blur(28px);
  -webkit-backdrop-filter: saturate(180%) blur(28px);
  box-shadow: 0 -8px 40px rgba(0,0,0,.14);
}
.dark .ios-sheet {
  background: rgba(28,28,30,.78);
  box-shadow: 0 -8px 40px rgba(0,0,0,.5);
}
.ios-sheet-handle {
  width: 36px; height: 5px;
  background: var(--ios-sep);
  border-radius: 3px;
  margin: 8px auto 0;
}

/* ── iOS Alert card — suzuvchi ogohlantirish/modal uchun material fon ── */
.ios-alert {
  background: rgba(255,255,255,.78);
  backdrop-filter: saturate(180%) blur(28px);
  -webkit-backdrop-filter: saturate(180%) blur(28px);
  box-shadow: 0 20px 60px rgba(0,0,0,.25);
}
.dark .ios-alert {
  background: rgba(28,28,30,.8);
  box-shadow: 0 20px 60px rgba(0,0,0,.6);
}

/* ── Status pills ── */
.pill-yellow  { background:rgba(255,214,0,.15);  color:#B8860B; }
.pill-blue    { background:rgba(0,122,255,.12);   color:var(--ios-blue); }
.pill-purple  { background:rgba(175,82,222,.12);  color:var(--ios-purple); }
.pill-green   { background:rgba(52,199,89,.12);   color:#1a7a35; }
.dark .pill-yellow { color:#FFD600; }
.dark .pill-green  { color:var(--ios-green); }

</style>
</head>
<body>

<!-- Status bar spacer -->
<div class="safe-top" style="background:var(--ios-bg)"></div>

<!-- Offline banner -->
<div id="offline-bar" class="hidden fixed left-0 right-0 z-[500] text-center ios-caption2 font-semibold py-1.5 bg-[#FF3B30] text-white"
     style="top:env(safe-area-inset-top,47px)">
  Internet aloqasi yo'q
</div>

<!-- iOS Toast / Alert Banner -->
<div id="toast" class="fixed left-4 right-4 z-[400] hidden"
     style="top:calc(env(safe-area-inset-top,47px) + 8px)">
  <div id="toast-inner"
       class="ios-alert flex items-center gap-3 px-4 py-3.5"
       style="border-radius:14px">
    <div id="toast-icon-wrap"
         class="w-10 h-10 rounded-[12px] flex items-center justify-center flex-shrink-0">
      <i id="toast-icon" class="text-lg"></i>
    </div>
    <div class="flex-1 min-w-0">
      <div id="toast-title" class="ios-footnote font-semibold leading-tight"></div>
      <div id="toast-body"  class="ios-caption2 mt-0.5 leading-tight" style="color:var(--ios-label3)"></div>
    </div>
    <button onclick="hideToast()" style="color:var(--ios-label3);font-size:20px;line-height:1">×</button>
  </div>
</div>

<!-- Page content -->
<main class="pb-safe overflow-y-auto" id="main-content" style="min-height:100vh">
  {% block content %}{% endblock %}
</main>

<!-- iOS Tab Bar — Instagram'dagi kabi chetlardan bo'shliq bilan suzib turadi
     (ekran chetiga yopishmaydi) -->
<div class="ios-tabbar fixed left-5 right-5 z-50"
     style="bottom:calc(env(safe-area-inset-bottom,16px) + 10px)">
  <div class="flex items-center justify-around px-1 py-1">

    <a href="{% url 'driver:home' %}" onclick="Native.vibrate(); dismissAllSheets()"
       class="flex flex-col items-center gap-[3px] px-4 py-2 min-h-[56px] justify-center transition-all active:opacity-60 relative">
      <i class="fas fa-car-side text-[24px] {% if active_tab == 'home' %}text-[#FFD600]{% else %}text-[#8E8E93]{% endif %}"></i>
      {% if pending_orders_count > 0 %}
      <span class="ios-badge absolute top-1 right-2" style="font-size:10px;min-width:16px;height:16px">{{ pending_orders_count }}</span>
      {% endif %}
      <span class="ios-caption2 {% if active_tab == 'home' %}text-[#FFD600] font-semibold{% else %}text-[#8E8E93]{% endif %}">Asosiy</span>
    </a>

    <!-- Jonli ovozli aloqa ("efir") — tinglash doim yoniq (avtomatik ulanadi),
         bu tugma esa FAQAT gapirishni yoqadi/o'chiradi (JS pastda) -->
    <button id="voice-btn" onclick="voiceToggleTalk()" type="button"
       class="flex flex-col items-center gap-[3px] px-4 py-2 min-h-[56px] justify-center transition-all active:opacity-60 relative border-0 bg-transparent cursor-pointer">
      <i id="voice-btn-icon" class="fas fa-microphone text-[24px]" style="color:#8E8E93"></i>
      <span id="voice-participants-badge" class="ios-badge absolute top-1 right-2 hidden" style="font-size:10px;min-width:16px;height:16px"></span>
      <span id="voice-tab-label" class="ios-caption2" style="color:#8E8E93">Efir</span>
    </button>

    <a href="{% url 'driver:history' %}" onclick="Native.vibrate(); dismissAllSheets()"
       class="flex flex-col items-center gap-[3px] px-4 py-2 min-h-[56px] justify-center transition-all active:opacity-60 relative">
      <i class="fas fa-clock-rotate-left text-[24px] {% if active_tab == 'history' %}text-[#FFD600]{% else %}text-[#8E8E93]{% endif %}"></i>
      {% if active_orders_count > 0 %}
      <span class="ios-badge absolute top-1 right-2" style="font-size:10px;min-width:16px;height:16px">{{ active_orders_count }}</span>
      {% endif %}
      <span class="ios-caption2 {% if active_tab == 'history' %}text-[#FFD600] font-semibold{% else %}text-[#8E8E93]{% endif %}">Tarix</span>
    </a>

  </div>
</div>


<script>
// Sahifalar orasida navigatsiyada sheet overlay qolib ketmasligi uchun
function dismissAllSheets() {
  document.querySelectorAll('#sheet-overlay').forEach(ov => {
    ov.classList.add('hidden');
    ov.style.pointerEvents = 'none';
  });
  document.querySelectorAll('#sheet').forEach(sh => {
    sh.style.transform = 'translateY(100%)';
  });
}
window.addEventListener('pagehide', dismissAllSheets);
window.addEventListener('pageshow', e => {
  if (e.persisted) dismissAllSheets();
});

// ── Native Bridge ─────────────────────────────────────────────────────────────
const Native = {
  isApp: typeof NativeBridge !== 'undefined',
  vibrate(p=10) {
    if (this.isApp) NativeBridge.postMessage(JSON.stringify({action:'vibrate'}));
    else if (navigator.vibrate) navigator.vibrate(p);
  },
  getLocation() {
    return new Promise((res,rej) => {
      if (this.isApp) {
        NativeBridge.postMessage(JSON.stringify({action:'get_location'}));
        window.addEventListener('vijdon_location', e=>res(e.detail), {once:true});
        setTimeout(()=>rej('timeout'), 10000);
      } else if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          p=>res({lat:p.coords.latitude,lng:p.coords.longitude}),
          rej, {enableHighAccuracy:true,timeout:8000}
        );
      } else rej('no_gps');
    });
  },
  callPhone(phone) { window.location.href='tel:'+phone; }
};

// Qabul qilingan buyurtmani haydovchi o'zi bekor qila olmaydi — operatorga
// qo'ng'iroq qilishi kerak (admin panel > Tarif sozlamalari da o'zgartiriladi).
const OPERATOR_PHONE = '{{ operator_phone|default:"1351" }}';
function callOperator() {
  try { Native.vibrate(); } catch(_) {}
  Native.callPhone(OPERATOR_PHONE);
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let _tt;
const _TS = {
  order:   {bg:'#FFD600',  ic:'#000',    icon:'fa-bell',         label:'Yangi buyurtma'},
  success: {bg:'#34C759',  ic:'#fff',    icon:'fa-checkmark',    label:''},
  error:   {bg:'#FF3B30',  ic:'#fff',    icon:'fa-xmark-circle', label:''},
  info:    {bg:'#007AFF',  ic:'#fff',    icon:'fa-info',         label:''},
};
function showToast(title, body='', type='info', dur=3200) {
  const s = _TS[type]||_TS.info;
  const wrap = document.getElementById('toast-icon-wrap');
  wrap.style.background = s.bg+'22';
  document.getElementById('toast-icon').className = `fas ${s.icon} text-lg`;
  document.getElementById('toast-icon').style.color = s.bg;
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-body').textContent  = body;
  const el = document.getElementById('toast');
  el.classList.remove('hidden');
  el.style.opacity='1'; el.style.transform='translateY(0)';
  clearTimeout(_tt);
  _tt = setTimeout(hideToast, type==='order'?8000:dur);
}
function hideToast() {
  const el = document.getElementById('toast');
  el.style.transition='opacity .25s,transform .25s';
  el.style.opacity='0'; el.style.transform='translateY(-8px)';
  setTimeout(()=>{ el.classList.add('hidden'); el.style.transition=''; el.style.opacity=''; el.style.transform=''; }, 260);
}

// ── Offline ───────────────────────────────────────────────────────────────────
// ── Admin panel orqali yuklangan/o'chirilgan ovozlar (taxi.context_processors) ──
window.VJ_DRIVER_SOUNDS = {{ driver_sounds_json|default:'{}'|safe }};
function _vjSound(key) {
  return (window.VJ_DRIVER_SOUNDS && window.VJ_DRIVER_SOUNDS[key]) || { enabled: true, url: null };
}
// ── Audio Alerts ─────────────────────────────────────────────────────────────
const Audio = {
  _play(notes) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      notes.forEach(([t, type, f, v=0.3, d=0.15]) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = type || 'sine';
        o.frequency.value = f;
        const st = ctx.currentTime + t;
        g.gain.setValueAtTime(0, st);
        g.gain.linearRampToValueAtTime(v, st + 0.015);
        g.gain.exponentialRampToValueAtTime(0.001, st + d);
        o.start(st); o.stop(st + d + 0.05);
      });
    } catch(_) {}
  },
  newOrder() {
    const cfg = _vjSound('driver_new_order');
    if (!cfg.enabled) return;
    // Fayl (standart .wav yoki admin yuklagan) — loop qilib chalinadi, stopNewOrder() to'xtatguncha
    try {
      if (window._newOrderAudio) { window._newOrderAudio.pause(); window._newOrderAudio = null; }
      const a = new window.Audio(cfg.url || '/static/driver/sounds/new_order.wav');
      a.volume = 1.0;
      a.loop = true;
      const p = a.play();
      if (p && p.catch) p.catch(() => {
        // Autoplay blocked — Web Audio API bilan chalishga urinamiz
        this._playWebAudio();
      });
      window._newOrderAudio = a;
    } catch(_) { this._playWebAudio(); }
  },
  _playWebAudio() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      window._newOrderCtx = ctx;
      const pattern = [
        [0, 1400, 0.5, 0.08], [0.13, 1800, 0.5, 0.08], [0.26, 2200, 0.6, 0.12],
        [0.5, 1400, 0.5, 0.08], [0.63, 1800, 0.5, 0.08], [0.76, 2200, 0.6, 0.12],
        [1.0, 1400, 0.5, 0.08], [1.13, 1800, 0.5, 0.08], [1.26, 2200, 0.6, 0.12],
      ];
      for (let r = 0; r < 4; r++) {
        pattern.forEach(([t, f, v, d]) => {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = 'square'; o.frequency.value = f;
          const st = ctx.currentTime + t + r * 1.6;
          g.gain.setValueAtTime(0, st);
          g.gain.linearRampToValueAtTime(v, st + 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, st + d);
          o.start(st); o.stop(st + d + 0.05);
        });
      }
    } catch(_) {}
  },
  stopNewOrder() {
    if (window._newOrderAudio) {
      window._newOrderAudio.pause();
      window._newOrderAudio.currentTime = 0;
      window._newOrderAudio = null;
    }
    if (window._newOrderCtx) {
      try { window._newOrderCtx.close(); } catch(_) {}
      window._newOrderCtx = null;
    }
  },
  _playCustomOrTones(key, notes) {
    const cfg = _vjSound(key);
    if (!cfg.enabled) return;
    if (cfg.url) { try { new window.Audio(cfg.url).play().catch(() => {}); } catch(_) {} return; }
    this._play(notes);
  },
  accept() {
    // Yashil — yuqoriga ko'tariluvchi 3 nota
    this._playCustomOrTones('driver_accept', [
      [0,    'sine',   523, 0.35, 0.12],
      [0.13, 'sine',   659, 0.35, 0.12],
      [0.26, 'sine',   784, 0.40, 0.22],
      [0.28, 'sine',  1047, 0.25, 0.18],
    ]);
  },
  reject() {
    // Qizil — pastga tushuvchi 2 nota
    this._playCustomOrTones('driver_reject', [
      [0,    'sawtooth', 440, 0.30, 0.14],
      [0.18, 'sawtooth', 330, 0.30, 0.14],
      [0.36, 'sawtooth', 220, 0.25, 0.22],
    ]);
  },
  complete() {
    // Oltin — tantanali 4 nota
    this._playCustomOrTones('driver_complete', [
      [0,    'sine',  523, 0.30, 0.10],
      [0.12, 'sine',  659, 0.30, 0.10],
      [0.24, 'sine',  784, 0.30, 0.10],
      [0.36, 'sine', 1047, 0.45, 0.30],
      [0.38, 'sine', 1319, 0.30, 0.28],
    ]);
  },
  offline()  { this._playCustomOrTones('driver_offline', [[0,'sawtooth',220,0.30,0.40]]); },
  online()   { this._playCustomOrTones('driver_online',  [[0,'sine',523,0.25,0.10],[0.15,'sine',784,0.25,0.18]]); },
  chatMessage() {
    this._playCustomOrTones('driver_chat_message', [
      [0,    'sine', 700, 0.25, 0.09],
      [0.10, 'sine', 900, 0.25, 0.12],
    ]);
  },
  balanceChanged() {
    this._playCustomOrTones('driver_balance_changed', [
      [0,    'sine',  659, 0.30, 0.10],
      [0.12, 'sine',  880, 0.35, 0.22],
    ]);
  },
};

// ── Web Push Subscription ────────────────────────────────────────────────────
// Push subscription home.html da (driver.is_on_duty bo'lganda) amalga oshiriladi.
// Service Worker ni faqat ro'yxatdan o'tkazamiz:
if ('serviceWorker' in navigator) {

let _hbgBusy = false;
// Ish navbatini almashtiradi. true/false qaytaradi — chaqiruvchi (masalan
// Asosiy sahifadagi tugma boshqaruvi) muvaffaqiyatsiz bo'lsa UI'ni orqaga
// qaytarishi (masalan tugmani qayta yoqishi) uchun buni tekshira oladi.
async function hbgToggleDuty() {
  if (_hbgBusy) { console.warn('hbgToggleDuty: band, e\'tiborsiz qoldirildi'); return false; }
  _hbgBusy = true;
  try {
    // So'rov osilib qolmasligi uchun taymaut — aks holda xato ko'rinmasdan
    // tugma abadiy "band" holatda qolib ketardi (foydalanuvchiga hech narsa
    // ko'rinmaydi: bosadi — hech narsa bo'lmaydi).
    const ctrl = new AbortController();
    const timeoutId = setTimeout(() => ctrl.abort(), 12000);
    const r = await fetch('{% url "driver:duty_toggle" %}', {
      method: 'POST',
      headers: { 'X-CSRFToken': getCookie('csrftoken') },
      signal: ctrl.signal,
    });
    clearTimeout(timeoutId);
    const d = await r.json();
    if (d.ok) {
      sessionStorage.removeItem('vijdon_addr');
      sessionStorage.removeItem('vijdon_lat');
      sessionStorage.removeItem('vijdon_lng');
      location.reload();
      return true;
    }
    console.error('hbgToggleDuty failed:', r.status, d);
    try { showToast('Xatolik', d.error || "Qayta urinib ko'ring", 'error', 4000); } catch(e) { console.error('showToast xatosi', e); }
    return false;
  } catch(err) {
    console.error('hbgToggleDuty error:', err);
    const msg = err?.name === 'AbortError'
      ? "So'rov 12 soniyada javob bermadi (internet sekin)"
      : (err?.message || 'Internet aloqasini tekshiring');
    try { showToast('Tarmoq xatosi', msg, 'error'); } catch(e) { console.error('showToast xatosi', e); }
    return false;
  } finally { _hbgBusy = false; }
}
function getCookie(n) {
  const v = document.cookie.match('(^|;) ?'+n+'=([^;]*)(;|$)');
  return v?v[2]:'';
}
document.addEventListener('DOMContentLoaded', ()=>{ Native.getLocation().catch(()=>{}); });

// ══════════════════════════════════════════════════════════════════════════════
// JONLI OVOZLI ALOQA ("EFIR") — WebRTC P2P mesh (barcha sahifalarda umumiy,
// mikrofon tugmasi Asosiy va Chat navbarlarida ko'rinadi — ikkalasi ham shu
// bir xil funksiyalarni ishlatadi)
// Ratsiya (taksi radiosi) mantig'i: TINGLASH doim yoniq — sahifa ochilishi
// bilan avtomatik ulanadi, mikrofonga ruxsat SO'RALMAYDI (chunki faqat qabul
// qilish uchun ruxsat kerak emas). Mikrofon tugmasi esa FAQAT gapirishni
// yoqib-o'chiradi — bosilganda birinchi marta mikrofonga ruxsat so'raladi,
// keyingi bosishlar esa shunchaki trekni bir zumda yoqib/o'chirib turadi
// (ulanishni qayta o'rnatmasdan).
// Alohida media-server (SFU) o'rniga — bu hostingda buni ishga tushirish imkoni
// bo'lmagani uchun — har bir haydovchi hozir efirda turgan BOSHQA barcha
// haydovchilar bilan to'g'ridan-to'g'ri (P2P) ulanadi, shuning uchun HAMMASI
// bir vaqtning o'zida gapira oladi. Signalizatsiya (offer/answer/ICE) uchun
// WebSocket o'rniga mavjud HTTP polling ishlatiladi (voice_heartbeat).
// DIQQAT — bilib qo'yish kerak bo'lgan cheklovlar:
//  1) Bu SPA emas — Asosiy/Chat sahifasidan chiqib ketilsa (Tarix/Profilga
//     o'tilsa) ulanish uziladi, qayta qaytganda avtomatik tiklanadi.
//  2) Mesh usuli faqat bir necha (~6-8) faol ishtirokchi uchun mos — juda ko'p
//     haydovchi bir vaqtda efirda bo'lsa, har birining qurilmasi va interneti
//     N-1 ta alohida ulanishni ko'tarishi kerak bo'lgani uchun sifat pasayishi
//     mumkin (haqiqiy ko'p ishtirokchili konferensiya uchun alohida media-server
//     — masalan LiveKit — kerak bo'ladi).
//  3) TURN server yo'q (faqat bepul ochiq STUN) — juda cheklangan/korporativ
//     tarmoqlarda ba'zi ulanishlar o'rnatilmasligi mumkin.
// ══════════════════════════════════════════════════════════════════════════════
const VOICE_ICE_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }];
// Oddiy Chrome brauzerda mikrofon muammosiz ishlaydi, lekin AYNAN shu
// Flutter ilova ichidagi Android WebView'da getUserMedia() "NotReadableError:
// Could not start audio source" bilan rad etadi — bir nechta turli brend
// telefonlarda ham xuddi shunday. Bu Android WebView'ning ma'lum, hujjatlashgan
// nozik joyi: standart audio-processing effektlari (aks-sado bosish, shovqin
// bostirish, avto-kuchaytirish) yoqilgan holda audio sessiyasini ochishga
// urinishda ba'zi qurilmalar/WebView versiyalarida audio HAL darajasida
// muvaffaqiyatsizlikka uchraydi — oddiy Chrome bunga chidamliroq. Shu sabab
// bu effektlarni ANIQ o'chirib so'raymiz — muammoni chetlab o'tish uchun eng
// arzon, kam-xavfli birinchi urinish.
const VOICE_AUDIO_CONSTRAINTS = {
  echoCancellation: false,
  noiseSuppression: false,
  autoGainControl: false,
};
let _voiceConnected   = false;  // efirga ulanganmiz (tinglash uchun) — avtomatik
let _voiceTalking     = false;  // mikrofon yoniqmi (faqat gapirish uchun)
let _voiceLocalStream = null;   // birinchi "gapirish" bosilganda yaratiladi
let _voicePeers       = {};     // driverId -> { pc, name, candQueue }
let _voiceHeartbeatTimer = null;

function _voicePeer(peerId, peerName) {
  if (_voicePeers[peerId]) return _voicePeers[peerId];
  const pc = new RTCPeerConnection({ iceServers: VOICE_ICE_SERVERS });
  // Ulanish har doim TO'LIQ (sendrecv) o'rnatiladi — mikrofonga ruxsat
  // avtomatik ulanish paytidayoq so'raladi va trek darhol qo'shiladi, faqat
  // "enabled=false" qilib o'chirib qo'yiladi. Shu tufayli gapirish/gapirmaslik
  // faqat lokal track.enabled bilan boshqariladi — hech qanday qayta
  // signalizatsiya (renegotiatsiya) kerak bo'lmaydi, shuning uchun eshitish
  // doim ishonchli ishlaydi. Faqat foydalanuvchi ruxsatni RAD ETGAN holdagina
  // (kamdan-kam) pastdagi recvonly zaxira yo'liga o'tamiz.
  if (_voiceLocalStream) {
    _voiceLocalStream.getTracks().forEach(t => pc.addTrack(t, _voiceLocalStream));
  } else {
    pc.addTransceiver('audio', { direction: 'recvonly' });
  }
  pc.onicecandidate = (e) => {
    if (e.candidate) _voiceSendSignal(peerId, 'candidate', e.candidate.toJSON());
  };
  pc.ontrack = (e) => {
    let audioEl = document.getElementById('voice-audio-' + peerId);
    if (!audioEl) {
      audioEl = document.createElement('audio');
      audioEl.id = 'voice-audio-' + peerId;
      audioEl.autoplay = true;
      audioEl.playsInline = true;
      document.body.appendChild(audioEl);
    }
    audioEl.srcObject = e.streams[0];
    _voicePlayAudio(audioEl);
  };
  const entry = { pc, name: peerName, candQueue: [] };
  _voicePeers[peerId] = entry;
  return entry;
}

// Tinglash endi hech qanday tugma bosilmasdan (sahifa ochilishi bilan)
// avtomatik boshlanadi — shuning uchun kiruvchi ovoz elementi (audio.play())
// brauzerning "avtoplay" siyosati tomonidan jimgina bloklanishi mumkin
// (foydalanuvchi hali sahifada birorta amal qilmagan bo'lsa). Bloklansa,
// keyingi bosish/tegishda avtomatik qayta urinib ko'ramiz.
const _voicePendingAudio = new Set();
function _voicePlayAudio(audioEl) {
  const p = audioEl.play();
  if (p && p.catch) {
    p.catch(() => { _voicePendingAudio.add(audioEl); });
  }
}
['click', 'touchstart'].forEach(evt => {
  document.addEventListener(evt, () => {
    if (!_voicePendingAudio.size) return;
    _voicePendingAudio.forEach(el => {
      el.play().then(() => _voicePendingAudio.delete(el)).catch(() => {});
    });
  }, { passive: true });
});

function _voiceSendSignal(to, kind, payload) {
  fetch('{% url "driver:voice_signal" %}', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
    body: JSON.stringify({ to, kind, payload }),
  }).catch(() => {});
}

function _voiceClosePeer(peerId) {
  const entry = _voicePeers[peerId];
  if (!entry) return;
  try { entry.pc.close(); } catch (_) {}
  const audioEl = document.getElementById('voice-audio-' + peerId);
  if (audioEl) audioEl.remove();
  delete _voicePeers[peerId];
}

// Mikrofonni bir martagina, birinchi foydalanuvchi teginishida (tugmani
// bosishi shart emas — sahifadagi istalgan bosish/tegish yetarli) fonda
// so'rab olamiz va allaqachon ulangan sheriklarga trekni biriktirib,
// bir martalik renegotiatsiya qilamiz. Buni SAHIFA OCHILISHI bilan darhol
// (foydalanuvchi teginmasdan turib) qilish MUAMMOLI edi — Android WebView'da
// getUserMedia() ba'zan foydalanuvchi ishorasisiz (user gesture) jimgina rad
// etiladi, garchi ilova darajasidagi RECORD_AUDIO ruxsati berilgan bo'lsa ham
// (haydovchilar ruxsat berdi deb aytishgan, lekin sayt baribir "ruxsat
// berilmagan" deb chiqargan holat shundan). Shuning uchun tinglash (recvonly)
// hech qanday ruxsatsiz darhol boshlanadi, mikrofon so'rovi esa haqiqiy
// tegishga bog'lab qo'yiladi.
let _voiceMicRequestInFlight = null;
// VAQTINCHA DIAGNOSTIKA — nega getUserMedia() rad etilganini bilish uchun
// haqiqiy xato saqlab qo'yiladi (masalan NotAllowedError / NotFoundError /
// NotReadableError) — sabab aniqlangach olib tashlanadi.
let _voiceLastMicError = null;
function _sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
async function _voiceEnsureLocalStream() {
  if (_voiceLocalStream) return _voiceLocalStream;
  if (_voiceMicRequestInFlight) return _voiceMicRequestInFlight;
  _voiceMicRequestInFlight = (async () => {
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: VOICE_AUDIO_CONSTRAINTS });
    } catch (err) {
      // "NotReadableError" ko'pincha VAQTINCHALIK bo'ladi — masalan
      // mikrofonning oldingi sessiyasi (boshqa sahifadagi yozib olish yoki
      // shu sahifaning o'zidagi oldingi ulanish) hali OS darajasida to'liq
      // bo'shatilib ulgurmagan bo'lishi mumkin. Darhol taslim bo'lmasdan,
      // qisqa kutib bir marta qayta urinib ko'ramiz.
      if (err && err.name === 'NotReadableError') {
        await _sleep(700);
        try {
          stream = await navigator.mediaDevices.getUserMedia({ audio: VOICE_AUDIO_CONSTRAINTS });
        } catch (err2) {
          _voiceLastMicError = err2;
          return null;
        }
      } else {
        _voiceLastMicError = err;
        return null;
      }
    }
    stream.getAudioTracks().forEach(t => { t.enabled = false; });
    _voiceLocalStream = stream;
    for (const id of Object.keys(_voicePeers)) {
      const entry = _voicePeers[id];
      stream.getTracks().forEach(t => entry.pc.addTrack(t, stream));
      const offer = await entry.pc.createOffer();
      await entry.pc.setLocalDescription(offer);
      _voiceSendSignal(id, 'offer', offer);
    }
    return stream;
  })();
  const result = await _voiceMicRequestInFlight;
  _voiceMicRequestInFlight = null;
  return result;
}
['click', 'touchstart'].forEach(evt => {
  document.addEventListener(evt, () => {
    if (document.getElementById('voice-btn')) _voiceEnsureLocalStream();
  }, { once: true, passive: true });
});

// Sahifa ochilishi bilan avtomatik chaqiriladi (pastda) — mikrofon so'ralmaydi,
// faqat tinglash (recvonly) uchun ulanadi (ruxsatsiz, gesture'siz ishlaydi).
async function _voiceAutoConnect() {
  let data;
  try {
    const r = await fetch('{% url "driver:voice_join" %}', {
      method: 'POST', headers: { 'X-CSRFToken': getCookie('csrftoken') },
    });
    data = await r.json();
  } catch (_) { return; }
  _voiceConnected = true;

  // Men yangi qo'shilganim uchun, allaqachon efirda turgan har bir ishtirokchiga
  // OFFER yuboraman — shu bilan ikki tomon ham bir vaqtda offer yubormay,
  // "kim birinchi so'z boshlaydi" mojarosining oldi olinadi.
  for (const p of (data.participants || [])) {
    const entry = _voicePeer(p.id, p.name);
    const offer = await entry.pc.createOffer();
    await entry.pc.setLocalDescription(offer);
    _voiceSendSignal(p.id, 'offer', offer);
  }

  _voiceUpdateParticipantsUI(data.participants || []);
  _voiceUpdateBtnUI();
  _voiceHeartbeatTimer = setInterval(_voiceTick, 3000);
  _voiceTick(); // birinchi javobni (offer/answer) 3s kutmasdan darhol so'rab olamiz
}

async function _voiceDisconnect() {
  clearInterval(_voiceHeartbeatTimer);
  _voiceHeartbeatTimer = null;
  try {
    await fetch('{% url "driver:voice_leave" %}', { method: 'POST', headers: { 'X-CSRFToken': getCookie('csrftoken') } });
  } catch (_) {}
  Object.keys(_voicePeers).forEach(id => _voiceClosePeer(id));
  if (_voiceLocalStream) { _voiceLocalStream.getTracks().forEach(t => t.stop()); _voiceLocalStream = null; }
  _voiceConnected = false;
  _voiceTalking = false;
  _voiceUpdateBtnUI();
}

// Mikrofon tugmasi bosilganda — FAQAT gapirishni yoqadi/o'chiradi, efir
// ulanishiga (tinglashga) tegmaydi. Tugmani bosish o'zi ham haqiqiy
// foydalanuvchi ishorasi bo'lgani uchun, agar birinchi tegishda mikrofon
// hali olinmagan bo'lsa (masalan ruxsat so'ralayotgan payt tugmaga tez
// bosilgan bo'lsa), shu yerda ham xavfsiz qayta so'raladi.
async function voiceToggleTalk() {
  Native.vibrate();
  const stream = await _voiceEnsureLocalStream();
  if (!stream) {
    const reason = _voiceLastMicError ? `${_voiceLastMicError.name}: ${_voiceLastMicError.message}` : '';
    showToast('Mikrofonga ruxsat kerak', reason || 'Brauzer/ilova sozlamalaridan ruxsat bering', 'error', 5000);
    return;
  }
  _voiceTalking = !_voiceTalking;
  stream.getAudioTracks().forEach(t => { t.enabled = _voiceTalking; });
  _voiceUpdateBtnUI();
}

async function _voiceTick() {
  if (!_voiceConnected) return;
  let data;
  try {
    const r = await fetch('{% url "driver:voice_heartbeat" %}', { cache: 'no-store' });
    data = await r.json();
  } catch (_) { return; }
  if (!data.joined) {
    // Server tomonidan chiqarib yuborilgan (masalan uzoq vaqt heartbeat
    // yubormagani uchun eskirgan hisoblanib o'chirilgan) — qayta ulanamiz
    clearInterval(_voiceHeartbeatTimer); _voiceHeartbeatTimer = null;
    Object.keys(_voicePeers).forEach(id => _voiceClosePeer(id));
    _voiceConnected = false;
    _voiceAutoConnect();
    return;
  }
  for (const sig of (data.signals || [])) {
    await _voiceHandleSignal(sig);
  }
  _voiceUpdateParticipantsUI(data.participants || []);
}

// Kimdir yangi "efir"ga qo'shilganda (menga OFFER yuborganda) allaqachon
// tinglayotganlarga qisqa signal tovushi eshittiramiz — shu orqali hammaga
// "kimdir kirdi" bildirilgan bo'ladi, mikrofon esa bunga aloqasi yo'q holda
// faqat gapirish uchun bo'lib qoladi.
function _voicePlayJoinChime() {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    const ctx = new Ctx();
    const play = () => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.35);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.4);
      osc.onended = () => ctx.close();
    };
    if (ctx.state === 'suspended') ctx.resume().then(play).catch(() => {});
    else play();
  } catch (_) {}
}

async function _voiceHandleSignal(sig) {
  const peerId = sig.from;
  if (sig.kind === 'leave') { _voiceClosePeer(peerId); return; }

  const isNewPeer = !_voicePeers[peerId];
  const entry = _voicePeer(peerId, sig.from_name);
  if (sig.kind === 'offer') {
    if (isNewPeer) _voicePlayJoinChime();
    await entry.pc.setRemoteDescription(new RTCSessionDescription(sig.payload));
    for (const c of entry.candQueue) { try { await entry.pc.addIceCandidate(c); } catch (_) {} }
    entry.candQueue = [];
    const answer = await entry.pc.createAnswer();
    await entry.pc.setLocalDescription(answer);
    _voiceSendSignal(peerId, 'answer', answer);
  } else if (sig.kind === 'answer') {
    await entry.pc.setRemoteDescription(new RTCSessionDescription(sig.payload));
    for (const c of entry.candQueue) { try { await entry.pc.addIceCandidate(c); } catch (_) {} }
    entry.candQueue = [];
  } else if (sig.kind === 'candidate') {
    if (entry.pc.remoteDescription && entry.pc.remoteDescription.type) {
      try { await entry.pc.addIceCandidate(sig.payload); } catch (_) {}
    } else {
      entry.candQueue.push(sig.payload);
    }
  }
}

function _voiceUpdateBtnUI() {
  const icon     = document.getElementById('voice-btn-icon');
  const tabLabel = document.getElementById('voice-tab-label');
  if (!icon) return;
  const talkColor = _voiceTalking ? '#FF3B30' : '#8E8E93';
  icon.style.color = talkColor;
  if (tabLabel) {
    tabLabel.style.color = talkColor;
    tabLabel.textContent = _voiceTalking ? 'Gapiryapsiz' : 'Efir';
  }
}

// Uzun matn o'rniga — Chat/Tarix tugmalaridagi kabi, efirdagi odamlar sonini
// mikrofon tugmasi ustida kichik raqamli belgi (badge) sifatida ko'rsatamiz.
function _voiceUpdateParticipantsUI(participants) {
  const badge = document.getElementById('voice-participants-badge');
  if (!badge) return;
  const count = participants.length;
  if (count > 0) {
    badge.textContent = count;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
}

// Mikrofon tugmasi mavjud sahifada (Asosiy/Chat) ochilishi bilan avtomatik
// "efir"ga ulanamiz (faqat tinglash uchun, ruxsat so'ralmaydi).
if (document.getElementById('voice-btn')) _voiceAutoConnect();

// Sahifadan chiqib ketilganda (boshqa tabga o'tilganda yoki ilova yopilganda)
// efirdan ham avtomatik chiqamiz — SPA bo'lmagani uchun sahifa navigatsiyasida
// JS holati saqlanmaydi, aks holda serverda "efirdaman" holati eskirguncha
// (~12s) osilib qolardi va boshqalarga chalkash ko'rinardi.
window.addEventListener('pagehide', () => {
  // Mikrofon trekini albatta to'xtatamiz — aks holda Android WebView'da
  // (SPA bo'lmagani uchun HAR BIR sahifa o'tishida) apparat darajasida
  // "band" holicha qolib ketishi mumkin, va keyingi sahifada getUserMedia()
  // "NotReadableError: Could not start audio source" bilan rad etiladi,
  // garchi ruxsat allaqachon berilgan bo'lsa ham.
  if (_voiceLocalStream) {
    try { _voiceLocalStream.getTracks().forEach(t => t.stop()); } catch (_) {}
  }
  if (_voiceConnected && navigator.sendBeacon) {
    const body = new Blob(
      [`csrfmiddlewaretoken=${encodeURIComponent(getCookie('csrftoken') || '')}`],
      { type: 'application/x-www-form-urlencoded' }
    );
    navigator.sendBeacon('{% url "driver:voice_leave" %}', body);
  }
});

// ── TAXIMETER (barcha sahifalarda umumiy) ──────────────────────────────────────
// Bu yerga (base.html) ko'chirilgan — aks holda Home'dan Tarix/Chat/Profilga
// o'tilganda sahifa to'liq qayta yuklangani uchun (SPA emas) taximetr JS holati
// butunlay o'chib qolar, GPS orqali masofa hisoblash to'xtab qolardi.
const TMX_BASE_PRICE     = {{ tariff_base_price|default:0 }};
const TMX_PER_KM         = {{ tariff_per_km|default:0 }};
const TMX_WAITING_PER_MIN = {{ tariff_waiting_per_min|default:0 }};

let _tmxActive    = false;
let _tmxOrderId   = null;
let _tmxOrder     = null;
let _tmxStartTime = null;
let _tmxInterval  = null;
let _tmxDistKm    = 0;
let _tmxPrevLat   = null;
let _tmxPrevLng   = null;
let _tmxWatchId   = null;
let _tmxPriceStr  = '0';
let _tmxTimeStr   = '0:00';
// ── Kutish (mijoz do'kon/uyga kirib qolganda, harakatsiz vaqt uchun pullik kutish) ──
let _tmxWaiting      = false;  // hozir kutish rejimidami
let _tmxWaitMs       = 0;      // avval yakunlangan kutish davrlaridan yig'ilgan umumiy ms
let _tmxWaitStartedAt = null;  // joriy kutish davri boshlangan payt (Date.now())
let _tmxSpeedKmh  = 0;

// Serverga taximetr ma'lumotlarini saqlash
let _tmxSaveTimer = null;

function _tmxSave() {
  if (!_tmxOrderId) return;
  clearTimeout(_tmxSaveTimer);
  _tmxSaveTimer = setTimeout(_tmxFlushNow, 2000);
}

// Joriy umumiy kutish davomiyligi (ms) — avval yakunlangan davrlar + hozir
// davom etayotgan davrning shu paytgacha o'tgan qismi (agar hozir kutayotgan bo'lsa)
function _tmxTotalWaitMs() {
  return _tmxWaitMs + ((_tmxWaiting && _tmxWaitStartedAt) ? (Date.now() - _tmxWaitStartedAt) : 0);
}

// Ilova fonga o'tganda/yopilganda darhol yuboramiz — 2s debounce tugashini kutmasdan,
// aks holda oxirgi bir necha soniyalik masofa/narx bazaga yozilmay qolib,
// ilova qayta ochilganda taximetr orqaga tortiladi
function _tmxFlushNow() {
  clearTimeout(_tmxSaveTimer);
  if (!_tmxOrderId) return;
  const body = `dist_km=${_tmxDistKm.toFixed(3)}&price=${parseFloat((_tmxPriceStr||'0').replace(/[^\d.]/g,''))||0}&waiting=${_tmxWaiting?1:0}&wait_ms=${Math.round(_tmxTotalWaitMs())}&csrfmiddlewaretoken=${encodeURIComponent(getCookie('csrftoken')||'')}`;
  if (navigator.sendBeacon) {
    navigator.sendBeacon(
      `/driver/orders/${_tmxOrderId}/meter/`,
      new Blob([body], { type: 'application/x-www-form-urlencoded' })
    );
  } else {
    fetch(`/driver/orders/${_tmxOrderId}/meter/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-CSRFToken': getCookie('csrftoken') },
      body,
      keepalive: true,
    }).catch(() => {});
  }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && _tmxActive) _tmxFlushNow();
});
window.addEventListener('pagehide', () => { if (_tmxActive) _tmxFlushNow(); });

function _tmxClear() {}

// Haversine masofa (km)
function _haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
            Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function _resetSheetOverlay() {
  const ov = document.getElementById('sheet-overlay');
  const sh = document.getElementById('sheet');
  if (!ov || !sh) return;
  ov.classList.add('hidden');
  ov.style.pointerEvents = 'none';
  sh.style.transform = 'translateY(100%)';
}

function _tmxPersist() {
  if (!_tmxOrderId) return;
  sessionStorage.setItem('vijdon_tmx_' + _tmxOrderId, JSON.stringify({
    price:  _tmxPriceStr,
    dist:   _tmxDistKm,
    time:   _tmxTimeStr,
    waitMs: _tmxTotalWaitMs(),
  }));
}

function tmxStart(orderId, order) {
  if (_tmxActive && _tmxOrderId === orderId) return;
  if (_tmxActive) tmxStop();
  _tmxActive  = true;
  _tmxOrderId = orderId;
  _tmxPrevLat = null;
  _tmxPrevLng = null;
  _tmxSpeedKmh = 0;

  _tmxOrder     = order;
  // Haqiqiy boshlanish vaqti — serverdan (ilova qayta ochilganda ham to'g'ri hisoblansin)
  _tmxStartTime = order?.tmx_start_time ? new Date(order.tmx_start_time).getTime() : Date.now();
  _tmxDistKm    = (order?.tmx_dist_km && parseFloat(order.tmx_dist_km) > 0)
                    ? parseFloat(order.tmx_dist_km) : 0;
  _tmxPriceStr  = '0';
  _tmxTimeStr   = '0:00';

  // Kutish holatini serverdan tiklash — ilova qayta ochilganda "Kutish" bosilgan
  // holat yo'qolib ketmasin (masalan haydovchi mijozni kutayotganda sahifani yopib qo'ysa)
  _tmxWaitMs        = (order?.tmx_paused_ms && parseInt(order.tmx_paused_ms) > 0) ? parseInt(order.tmx_paused_ms) : 0;
  _tmxWaiting       = !!order?.tmx_paused;
  _tmxWaitStartedAt = _tmxWaiting ? Date.now() : null;

  // sessionStorage dan tiklash (shu sessiya ichida sahifa yangilansa) — masofa uchun,
  // narx va vaqt har doim formuladan qayta hisoblanadi (pastda)
  try {
    const raw = sessionStorage.getItem('vijdon_tmx_' + orderId);
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved.dist > 0 && saved.dist > _tmxDistKm) _tmxDistKm = parseFloat(saved.dist);
      if (!_tmxWaiting && saved.waitMs > 0 && saved.waitMs > _tmxWaitMs) _tmxWaitMs = parseFloat(saved.waitMs);
    }
  } catch(_) {}

  // Narx va vaqt doim joriy masofa/vaqtdan hisoblanadi — bazadagi eski price
  // qiymatini "belgilangan narx" deb noto'g'ri qabul qilib, taximetrni muzlatib qo'ymaslik uchun
  _tmxPriceStr = Math.round(TMX_BASE_PRICE + _tmxDistKm * TMX_PER_KM + (_tmxTotalWaitMs()/60000) * TMX_WAITING_PER_MIN).toLocaleString('uz-UZ');
  if (_tmxStartTime) {
    const elapsed = Math.max(0, Math.floor((Date.now() - _tmxStartTime) / 1000));
    _tmxTimeStr = Math.floor(elapsed / 60) + ':' + String(elapsed % 60).padStart(2, '0');
  }
  // Ekranda ko'rsatiladigan (silliqlangan) qiymatlar — GPS nuqtalari notekis
  // kelgani uchun masofa "qotib-qotib" (sakrab-sakrab) o'zgarib ko'rinmasligi
  // uchun, haqiqiy qiymatga har kadr biroz yaqinlashtirib boriladi (pastda).
  _tmxDispDist  = _tmxDistKm;
  _tmxDispPrice = parseFloat(_tmxPriceStr.replace(/[^\d.]/g, '')) || 0;

  _tmxUpdateWaitUI();
  _tmxPersist();
  _tmxInterval = setInterval(_tmxTick, 1000);
  requestAnimationFrame(_tmxSmoothLoop);
  window.addEventListener('vijdon_location', _tmxOnLocation);
  if (navigator.geolocation) {
    _tmxWatchId = navigator.geolocation.watchPosition(
      pos => _tmxOnLocation({ detail: { lat: pos.coords.latitude, lng: pos.coords.longitude, speed: pos.coords.speed } }),
      () => {},
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 3000 }
    );
  }
}

function _tmxOnLocation(e) {
  const lat = e.detail?.lat;
  const lng = e.detail?.lng;
  const spd = e.detail?.speed;
  if (!lat || !lng || !_tmxActive) return;

  if (spd != null && spd >= 0) _tmxSpeedKmh = Math.round(spd * 3.6);

  // Kutish rejimida masofa hisoblanmaydi — mijoz do'kon/uyga kirib qolganda
  // haydovchi harakatsiz turadi (yoki atrofda kichik yurishlar qiladi), bular
  // masofa sifatida hisobga olinmasligi kerak, faqat kutish narxi qo'shiladi.
  if (_tmxPrevLat !== null && !_tmxWaiting) {
    const d = _haversine(_tmxPrevLat, _tmxPrevLng, lat, lng);
    if (d > 0.005 && d < 2.0) {
      _tmxDistKm += d;
      _tmxUpdatePrice();
      _syncSheetTmx();
      _tmxSave();
    }
  }
  _tmxPrevLat = lat;
  _tmxPrevLng = lng;
}

function _syncSheetTmx(order) {
  const p = document.getElementById('sheet-tmx-price');
  const t = document.getElementById('sheet-tmx-time');
  const d = document.getElementById('sheet-tmx-dist');
  const s = document.getElementById('sheet-tmx-speed');
  // Faol bo'lsa narx/masofani _tmxSmoothLoop yangilaydi (silliq o'sish uchun) —
  // bu yerda faqat FAOL BO'LMAGAN (masalan yakunlangan) buyurtma uchun statik
  // qiymatlarni ko'rsatamiz.
  if (!_tmxActive) {
    if(p) p.textContent = (order?.price ? parseInt(order.price).toLocaleString('uz-UZ') : _tmxPriceStr) || '0';
    if(d) d.textContent = parseFloat(order?.tmx_dist_km || _tmxDistKm || 0).toFixed(2);
  }
  if(t) t.textContent = _tmxTimeStr  || '0:00';
  if(s) s.textContent = _tmxSpeedKmh;
}

// Ekrandagi narx/masofani har kadrda haqiqiy qiymatga biroz yaqinlashtirib boradi —
// GPS nuqtalari notekis (har necha soniyada bir) kelgani uchun raqam sakrab-sakrab
// emas, doim silliq (uzluksiz) o'sayotgandek ko'rinadi.
let _tmxDispDist  = 0;
let _tmxDispPrice = 0;
function _tmxSmoothLoop() {
  if (!_tmxActive) return;
  const priceTarget = parseFloat((_tmxPriceStr || '0').replace(/[^\d.]/g, '')) || 0;
  _tmxDispDist  += (_tmxDistKm  - _tmxDispDist)  * 0.12;
  _tmxDispPrice += (priceTarget - _tmxDispPrice) * 0.12;
  if (Math.abs(_tmxDistKm  - _tmxDispDist)  < 0.001) _tmxDispDist  = _tmxDistKm;
  if (Math.abs(priceTarget - _tmxDispPrice) < 1)     _tmxDispPrice = priceTarget;
  const p = document.getElementById('sheet-tmx-price');
  const d = document.getElementById('sheet-tmx-dist');
  if (p) p.textContent = Math.round(_tmxDispPrice).toLocaleString('uz-UZ');
  if (d) d.textContent = _tmxDispDist.toFixed(2);
  requestAnimationFrame(_tmxSmoothLoop);
}

function _tmxTick() {
  if (!_tmxActive || !_tmxStartTime) return;
  const elapsed = Math.floor((Date.now() - _tmxStartTime) / 1000);
  const min = Math.floor(elapsed / 60);
  const sec = elapsed % 60;
  _tmxTimeStr = min + ':' + String(sec).padStart(2, '0');
  _tmxUpdatePrice();
  _syncSheetTmx();
  _tmxUpdateWaitUI();
  // Kutish rejimida ham narx (vaqt asosida) o'sib boradi — shuning uchun bu holatda
  // ham davriy saqlash kerak, aks holda faqat GPS harakatiga bog'liq _tmxSave()
  // chaqirilmay, kutish narxi bazaga yozilmay qolib ketardi.
  if (_tmxWaiting) _tmxSave();
  // Taximetr qiymatlarini sessionStorage ga saqlaymiz — history.html ularni o'qiydi
  _tmxPersist();
}

function _tmxUpdatePrice() {
  if (!_tmxActive) return;
  const waitMinutes = _tmxTotalWaitMs() / 60000;
  const price = Math.round(TMX_BASE_PRICE + _tmxDistKm * TMX_PER_KM + waitMinutes * TMX_WAITING_PER_MIN);
  _tmxPriceStr = price.toLocaleString('uz-UZ');
}

// "⏸ Kutish" / "▶️ Davom etish" tugmasi bosilganda chaqiriladi (home.html dagi
// taximetr paneli ichida). Masofa hisoblanishini to'xtatib/davom ettirib,
// vaqt asosidagi kutish narxini boshlaydi/yakunlaydi.
function tmxToggleWait() {
  if (!_tmxActive) return;
  if (_tmxWaiting) {
    _tmxWaitMs = _tmxTotalWaitMs();
    _tmxWaiting = false;
    _tmxWaitStartedAt = null;
  } else {
    _tmxWaiting = true;
    _tmxWaitStartedAt = Date.now();
  }
  _tmxUpdatePrice();
  _tmxUpdateWaitUI();
  _tmxPersist();
  _tmxFlushNow();
  try { showToast(_tmxWaiting ? 'Kutish boshlandi' : 'Safar davom etmoqda', '', 'info', 2000); } catch(_) {}
}

function _fmtWaitTime(ms) {
  const totalSec = Math.floor(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  return min + ':' + String(sec).padStart(2, '0');
}

function _tmxUpdateWaitUI() {
  const btn = document.getElementById('tmx-wait-btn');
  if (btn) {
    btn.textContent = _tmxWaiting ? "▶️ Davom etish" : "⏸ Kutish (mijoz band)";
    btn.style.background = _tmxWaiting ? 'rgba(255,149,0,.18)' : 'rgba(255,255,255,.08)';
    btn.style.color = _tmxWaiting ? '#FF9500' : 'rgba(255,255,255,.75)';
  }
  const w = document.getElementById('tmx-wait-info');
  if (w) {
    const waitMs = _tmxTotalWaitMs();
    if (waitMs > 500) {
      const waitPrice = Math.round((waitMs / 60000) * TMX_WAITING_PER_MIN);
      w.textContent = `⏱ Kutish: ${_fmtWaitTime(waitMs)} (+${waitPrice.toLocaleString('uz-UZ')} so'm)`;
      w.style.display = '';
    } else {
      w.style.display = 'none';
    }
  }
}

// ── Taximetr vidjeti — umumiy markup generatori (Asosiy va Tarix sahifalarida
// ishlatiladi, ikkalasida ham bir xil ko'rinish bo'lishi uchun). Har bir sahifa
// o'zining narx/vaqt/masofa/tezlik qiymatlarini hisoblaydi, bu funksiya faqat
// tayyor qiymatlardan (cfg) HTML yasaydi.
//   cfg.live        — pulsdor nuqta ko'rsatilsinmi (hozir jonli kuzatilyaptimi)
//   cfg.price/time/dist/speed — ko'rsatiladigan qiymatlar (speed/time null bo'lsa, ustun umuman ko'rsatilmaydi)
//   cfg.priceId/timeId/distId/speedId — shu span'larga id beriladi (jonli yangilanish uchun); berilmasa, oddiy matn
//   cfg.showWait/cfg.waiting/cfg.waitInfoHTML — "Kutish" tugmasi
//   cfg.totalPrice  — berilsa, "JAMI TO'LOV" banneri ko'rsatiladi
function _tmxRenderWidget(cfg) {
  const metric = (icon, color, val, id, unit, label) => `
    <div style="flex:1;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border-radius:12px;padding:8px 10px;min-width:0">
      <div style="width:26px;height:26px;border-radius:50%;background:${color}2e;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <i class="fas ${icon}" style="color:${color};font-size:11px"></i>
      </div>
      <div style="min-width:0">
        <div style="font-size:13px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;white-space:nowrap">${id?`<span id="${id}">${val}</span>`:val}${unit?` <span style="font-size:10px;font-weight:600;color:rgba(255,255,255,.35)">${unit}</span>`:''}</div>
        <div style="font-size:8.5px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.3px">${label}</div>
      </div>
    </div>`;

  const cols = [
    cfg.time  != null ? metric('fa-stopwatch',   '#AF52DE', cfg.time,  cfg.timeId,  '',     'VAQT')    : '',
    metric('fa-route', '#007AFF', cfg.dist, cfg.distId, 'km', "MASOFA"),
    cfg.speed != null ? metric('fa-gauge-high', '#34C759', cfg.speed, cfg.speedId, 'km/h', 'TEZLIK') : '',
  ].join('');

  return `
  <div style="background:linear-gradient(160deg,#1c1c1f,#0a0a0b);border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.08);box-shadow:0 10px 28px rgba(0,0,0,.4)">
    <div style="padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:6px">
        <div style="width:7px;height:7px;border-radius:50%;background:#AF52DE;box-shadow:0 0 8px #AF52DE${cfg.live?';animation:pulse-dot 1.4s ease-in-out infinite':''}"></div>
        <span style="font-size:11px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.6px;text-transform:uppercase">Taximetr</span>
      </div>
      <span style="font-size:11px;font-weight:700;color:${cfg.statusColor}">${cfg.statusText}</span>
    </div>
    <div style="text-align:center;padding:6px 16px 12px">
      <div style="font-size:36px;font-weight:800;color:#FFD600;letter-spacing:-.6px;line-height:1.1;font-variant-numeric:tabular-nums">
        ${cfg.priceId?`<span id="${cfg.priceId}">${cfg.price}</span>`:cfg.price}<span style="font-size:15px;font-weight:700;margin-left:5px;color:rgba(255,214,0,.55)">so'm</span>
      </div>
    </div>
    <div style="height:.5px;background:rgba(255,255,255,.08);margin:0 14px"></div>
    <div style="display:flex;gap:8px;padding:12px">${cols}</div>
    ${cfg.showWait?`
    <div style="margin:0 12px 12px">
      <button id="tmx-wait-btn" onclick="tmxToggleWait()" style="display:block;width:100%;box-sizing:border-box;padding:12px;border-radius:12px;border:none;cursor:pointer;font-weight:700;font-size:14px;background:${cfg.waiting?'rgba(255,149,0,.18)':'rgba(255,255,255,.08)'};color:${cfg.waiting?'#FF9500':'rgba(255,255,255,.75)'}">${cfg.waiting?"▶️ Davom etish":"⏸ Kutish (mijoz band)"}</button>
      <div id="tmx-wait-info" style="text-align:center;font-size:11px;color:#FF9500;font-weight:700;margin-top:6px;${cfg.waitInfoHTML?'':'display:none'}">${cfg.waitInfoHTML||''}</div>
    </div>`:''}
    ${cfg.totalPrice?`
    <div style="margin:0 12px 12px;padding:12px 14px;background:rgba(52,199,89,.1);border-radius:12px;border:1px solid rgba(52,199,89,.2);display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:12px;color:rgba(52,199,89,.75);font-weight:700;letter-spacing:.2px">JAMI TO'LOV</span>
      <span style="font-size:21px;font-weight:800;color:#34C759;letter-spacing:-.3px">${cfg.totalPrice} so'm</span>
    </div>`:''}
  </div>`;
}

function tmxStop() {
  _tmxActive = false;
  clearInterval(_tmxInterval);
  _tmxInterval = null;
  if (_tmxWatchId !== null) {
    navigator.geolocation?.clearWatch(_tmxWatchId);
    _tmxWatchId = null;
  }
  window.removeEventListener('vijdon_location', _tmxOnLocation);
  _tmxWaiting = false;
  _tmxWaitMs = 0;
  _tmxWaitStartedAt = null;
  _tmxClear();
}

// Har qanday sahifada (Home, Tarix, Chat, Profil) faol (on_way/arrived) buyurtma
// bo'lsa, taximetrni shu yerda tiklaymiz. Home sahifasi buni o'zi ham darhol
// (oldindan yuklangan ma'lumot bilan, tarmoqqa so'rov yubormasdan) qiladi —
// tmxStart() ichidagi tekshiruv tufayli bu yerdagi so'rov ular uchun shunchaki
// zararsiz takroriy urinish, boshqa sahifalar uchun esa yagona manba bo'ladi.
(function(){
  fetch('{% url "driver:orders_json" %}', {cache:'no-store'})
    .then(r => r.json())
    .then(d => {
      if (!d.orders) return;
      const active = d.orders.find(o => o.status === 'on_way' || o.status === 'arrived');
      if (active) tmxStart(active.id, active);
    })
    .catch(() => {});
})();

// ── Wake Lock (barcha sahifalarda umumiy) ──────────────────────────────────────
// Avval faqat Home sahifasida bor edi — Tarix/Chat/Profilga o'tilganda ekran
// qulflanib qolib, JS taymerlari (jumladan taximetr) sekinlashib "qotib-qotib"
// ishlab qolardi. Endi bu yerda — qaysi sahifada bo'lishidan qat'i nazar ishlaydi.
const IS_ON_DUTY_GLOBAL = {{ driver.is_on_duty|yesno:'true,false' }};
let _wakeLock = null;

// Har sahifa ochilishida "ish navbatidami" holatini Flutter'ga bildiramiz —
// shu orqali ilova fon xizmatini (yangi buyurtma bildirishnomasi ilova
// yopiq/fonda bo'lganda ham kelishi uchun) yoqib/o'chirib turadi. Liniyaga
// chiqish/chiqish tugmasi bosilganda sahifa qayta yuklanadi (location.reload),
// shuning uchun bu yerga qo'yilgan signal har doim serverdagi haqiqiy holat
// bilan mos bo'lib turadi.
if (typeof FlutterDuty !== 'undefined') {
  FlutterDuty.postMessage(IS_ON_DUTY_GLOBAL ? '1' : '0');
}

async function requestWakeLock() {
  if (!(IS_ON_DUTY_GLOBAL || _tmxActive)) return;
  if (!('wakeLock' in navigator)) return;
  if (_wakeLock) return;
  try {
    _wakeLock = await navigator.wakeLock.request('screen');
    _wakeLock.addEventListener('release', () => { _wakeLock = null; });
  } catch(_) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
  if (document.visibilityState === 'hidden') Audio.stopNewOrder();
});
if (IS_ON_DUTY_GLOBAL) requestWakeLock();
// Ba'zi qurilmalarda/WebView versiyalarida wake lock kutilmaganda (visibilitychange
// va 'release' hodisasisiz) bo'shab qolishi mumkin — shuning uchun har 15 soniyada
// zararsiz tarzda qayta so'raymiz (agar allaqachon faol bo'lsa, hech narsa qilmaydi)
setInterval(requestWakeLock, 15000);
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
